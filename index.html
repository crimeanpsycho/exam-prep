<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подготовка к срезу — Банки, IT, PM</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6366f1;
      --accent2: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --card-front: #1e2235;
      --card-back: #1a2d4a;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: var(--muted); font-size: 13px; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .btn.active { background: var(--accent); border-color: var(--accent); }

    /* LAYOUT */
    .app { display: flex; height: calc(100vh - 65px); }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 12px;
    }
    .sidebar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: .08em; padding: 4px 8px 12px; }

    .section-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 2px;
    }
    .section-item:hover { background: var(--surface2); }
    .section-item.active { background: rgba(99, 102, 241, .2); border: 1px solid rgba(99,102,241,.4); }
    .section-item .section-name { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .section-item .section-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 8px; vertical-align: middle; }
    .section-progress-bar { height: 2px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .section-progress-fill { height: 100%; border-radius: 2px; transition: width .3s; }

    /* ALL item */
    .all-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .all-item:hover { border-color: var(--accent); }
    .all-item.active { background: rgba(99,102,241,.2); border-color: rgba(99,102,241,.4); }

    /* MAIN */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-chip strong { color: var(--text); }
    .stat-chip span { color: var(--muted); }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .controls .spacer { flex: 1; }

    /* CARD AREA */
    .card-area {
      width: 100%;
      max-width: 680px;
      perspective: 1200px;
      margin-bottom: 24px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      min-height: 320px;
      transform-style: preserve-3d;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      min-height: 320px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      padding: 40px;
      display: flex;
      flex-direction: column;
    }
    .card-front {
      background: linear-gradient(135deg, #1e2235 0%, #252945 100%);
      border: 1px solid var(--border);
    }
    .card-back {
      background: linear-gradient(135deg, #1a2d4a 0%, #1a3a4a 100%);
      border: 1px solid rgba(99,102,241,.3);
      transform: rotateY(180deg);
    }

    .card-tag {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent2);
      margin-bottom: 16px;
    }
    .card-back .card-tag { color: var(--green); }

    .card-counter {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card-question {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      flex: 1;
      display: flex;
      align-items: center;
    }
    .card-answer {
      font-size: 15px;
      line-height: 1.7;
      color: #cbd5e1;
      flex: 1;
      overflow-y: auto;
      max-height: 400px;
    }

    .card-hint {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .card-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
    }

    /* NAVIGATION */
    .nav-row {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 680px;
    }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 48px; height: 48px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--accent); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

    .progress-section { flex: 1; }
    .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-align: center; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .3s; }

    /* RATING BUTTONS */
    .rating-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 680px;
      margin-top: 20px;
    }
    .rating-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
      text-align: center;
    }
    .rating-btn.know { background: rgba(34, 197, 94, .1); border-color: rgba(34, 197, 94, .3); color: var(--green); }
    .rating-btn.know:hover { background: rgba(34, 197, 94, .2); }
    .rating-btn.unsure { background: rgba(245, 158, 11, .1); border-color: rgba(245, 158, 11, .3); color: var(--yellow); }
    .rating-btn.unsure:hover { background: rgba(245, 158, 11, .2); }
    .rating-btn.dontknow { background: rgba(239, 68, 68, .1); border-color: rgba(239, 68, 68, .3); color: var(--red); }
    .rating-btn.dontknow:hover { background: rgba(239, 68, 68, .2); }
    .rating-btn.hidden { visibility: hidden; pointer-events: none; }

    /* COMPLETED SCREEN */
    .completed-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .completed-screen.visible { display: flex; }
    .completed-emoji { font-size: 64px; margin-bottom: 16px; }
    .completed-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .completed-sub { color: var(--muted); margin-bottom: 32px; }
    .completed-stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
    .completed-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 24px; }
    .completed-stat .val { font-size: 28px; font-weight: 800; }
    .completed-stat .lbl { font-size: 12px; color: var(--muted); }
    .completed-stat.green .val { color: var(--green); }
    .completed-stat.yellow .val { color: var(--yellow); }
    .completed-stat.red .val { color: var(--red); }

    /* SECTION COLORS */
    .c1 { background: #6366f1; }
    .c2 { background: #0ea5e9; }
    .c3 { background: #a855f7; }
    .c4 { background: #f59e0b; }
    .c5 { background: #10b981; }
    .c6 { background: #ef4444; }
    .c7 { background: #f97316; }
    .c8 { background: #ec4899; }
    .c9 { background: #14b8a6; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 16px; }
      .card-face { padding: 24px; }
      .card-question { font-size: 17px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">СрезПро</div>
      <div class="subtitle">Банки · IT · Продукт · ASTON 2026</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn" id="btn-shuffle" title="Перемешать">⇄ Перемешать</button>
    <button class="btn" id="btn-reset">↺ Сначала</button>
    <button class="btn primary" id="btn-repeat-wrong">Повторить сложные</button>
  </div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="controls" id="controls"></div>

    <div class="card-area" id="card-area">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front" id="card-front">
          <div class="card-tag">Вопрос</div>
          <div class="card-counter" id="card-counter"></div>
          <div class="card-question" id="card-question"></div>
          <div class="card-hint">Нажмите на карточку или <kbd>Пробел</kbd> чтобы увидеть ответ</div>
        </div>
        <div class="card-face card-back" id="card-back">
          <div class="card-tag">Ответ</div>
          <div class="card-answer" id="card-answer"></div>
          <div class="card-hint"><kbd>←</kbd> Назад &nbsp; <kbd>→</kbd> Вперёд</div>
        </div>
      </div>
    </div>

    <div class="nav-row" id="nav-row">
      <button class="nav-btn" id="btn-prev" title="Назад">←</button>
      <div class="progress-section">
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <button class="nav-btn" id="btn-next" title="Вперёд">→</button>
    </div>

    <div class="rating-row" id="rating-row">
      <button class="rating-btn know" id="btn-know">✓ Знаю</button>
      <button class="rating-btn unsure" id="btn-unsure">~ Не уверен</button>
      <button class="rating-btn dontknow" id="btn-dontknow">✗ Не знаю</button>
    </div>

    <div class="completed-screen" id="completed-screen">
      <div class="completed-emoji">🎉</div>
      <div class="completed-title">Раунд завершён!</div>
      <div class="completed-sub" id="completed-sub"></div>
      <div class="completed-stats" id="completed-stats"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
        <button class="btn primary" id="btn-repeat-wrong2">Повторить сложные</button>
        <button class="btn" id="btn-restart">Начать заново</button>
      </div>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  {
    id: 1, color: "c1",
    name: "Банки и небанковские организации",
    cards: [
      ["Что такое банк? Чем он отличается от обычной финансовой компании?", "Банк — это кредитная организация, имеющая лицензию Центрального банка и обладающая исключительным правом совмещать три вида операций: привлечение денег во вклады, размещение средств от своего имени (кредитование) и ведение банковских счетов. Обычная финансовая компания (страховщик, МФО, лизинговая компания) может выполнять отдельные финансовые функции, но не вправе совмещать все три операции одновременно."],
      ["Какие признаки отличают банковскую организацию от небанковской?", "Три ключевых признака банка: 1) наличие лицензии ЦБ РФ на осуществление банковской деятельности; 2) право принимать вклады физических и юридических лиц; 3) право выдавать кредиты и открывать банковские счета. Небанковские кредитные организации (НКО) имеют ограниченный перечень операций — например, только расчёты или только привлечение вкладов юрлиц."],
      ["Что такое Центральный банк и какие функции он выполняет?", "Центральный банк (ЦБ РФ, Банк России) — это мегарегулятор финансового рынка. Его основные функции: эмиссия денег (выпуск рублей), денежно-кредитная политика (установка ключевой ставки), банковский надзор (выдача и отзыв лицензий), обеспечение стабильности финансовой системы, организация расчётов, управление золотовалютными резервами. ЦБ не преследует цель получения прибыли."],
      ["Чем ЦБ отличается от коммерческого банка?", "ЦБ — это государственный регулятор, а не коммерческая структура. Он не работает с обычными клиентами, не выдаёт кредиты физлицам, не принимает вклады населения. ЦБ обслуживает коммерческие банки (они держат счета в ЦБ), государство и зарубежные ЦБ. Коммерческие банки работают ради прибыли и обслуживают клиентов. ЦБ работает ради стабильности системы."],
      ["Что такое кредитная организация? Приведи примеры.", "Кредитная организация — юридическое лицо, получившее лицензию ЦБ и имеющее право проводить банковские операции. Делятся на банки (Сбер, ВТБ, Тинькофф) и небанковские кредитные организации — НКО (платёжная НКО, расчётная НКО, НКО — центральный контрагент). Пример расчётной НКО — АО НКО «ЮМани» (бывшие Яндекс.Деньги)."],
      ["Какие основные функции выполняют кредитные организации?", "Привлечение средств (депозиты, вклады), размещение средств (кредиты, инвестиции), проведение расчётов и платежей, валютные операции, выдача банковских гарантий, инкассация, операции с ценными бумагами. Конкретный набор функций зависит от типа лицензии."],
      ["Чем небанковская кредитная организация (НКО) отличается от банка?", "НКО имеет ограниченный круг операций: не может совмещать привлечение вкладов физлиц, кредитование и открытие счетов одновременно. НКО специализируются — например, расчётные НКО занимаются только платежами и переводами, не выдавая кредитов. Капиталовложения и требования к капиталу у НКО ниже, чем у банков."],
      ["Какие виды небанковских кредитных организаций существуют в РФ?", "В РФ выделяют: расчётные НКО (проводят платежи, не кредитуют), платёжные НКО (оказывают платёжные услуги), депозитно-кредитные НКО (привлекают вклады юрлиц и выдают кредиты, но не ведут счета физлиц), НКО — центральные контрагенты (клиринг на бирже, например НКЦ)."],
      ["Что такое лицензия ЦБ и зачем она нужна?", "Лицензия ЦБ — разрешение на проведение банковских операций. Без неё вести банковскую деятельность незаконно. Бывает базовая (ограниченный перечень операций, капитал от 300 млн руб.) и универсальная (полный перечень, капитал от 1 млрд руб.). ЦБ может отозвать лицензию за нарушения — это фактически означает ликвидацию банка."],
      ["Назови 3-4 отличия банка от МФО (микрофинансовой организации).", "1) Банк имеет лицензию ЦБ, МФО — свидетельство о включении в реестр. 2) Банк принимает вклады физлиц, МФО — нет. 3) Банк выдаёт кредиты под 15-25%, МФО — под 100-365% годовых. 4) Банк страхует вклады через АСВ, МФО — не страхует. 5) Требования к капиталу у банков несравнимо выше."],
      ["Что такое системно значимый банк? Почему он так называется?", "Системно значимые кредитные организации (СЗКО) — банки, чьё банкротство способно дестабилизировать всю финансовую систему страны. ЦБ выделяет 13 таких банков в РФ (Сбер, ВТБ, Газпромбанк, Альфа-банк и др.). К ним применяются повышенные требования к капиталу и ликвидности. За ними усиленный надзор."],
      ["Как ЦБ регулирует деятельность банков? Приведи примеры инструментов.", "ЦБ использует: ключевую ставку (влияет на стоимость денег в экономике), обязательные резервные требования (банки хранят часть средств в ЦБ), нормативы достаточности капитала (Н1.0, Н1.1, Н1.2), нормативы ликвидности (Н2, Н3, Н4), операции РЕПО и депозитные аукционы, выдачу и отзыв лицензий."],
      ["Что такое резервные требования и зачем они нужны?", "Обязательные резервы — часть привлечённых банком средств, которую он обязан хранить на счёте в ЦБ. Это инструмент управления ликвидностью и денежной массой: если ЦБ повышает норму резервов, банки могут выдать меньше кредитов, что снижает инфляцию."],
      ["Чем страхование вкладов отличается в банке и в НКО?", "В банках вклады физлиц застрахованы государством через Агентство по страхованию вкладов (АСВ) — до 1,4 млн рублей на одного вкладчика в одном банке. В НКО страхование вкладов физлиц не предусмотрено, поскольку НКО не имеют права привлекать вклады от физических лиц."],
      ["Что такое ключевая ставка и как она влияет на банки?", "Ключевая ставка — процент, под который ЦБ выдаёт кредиты коммерческим банкам и принимает от них депозиты. Она задаёт минимальную «стоимость денег» в экономике. Когда ключевая ставка растёт — банки повышают ставки по кредитам и вкладам. Когда падает — кредиты дешевеют, экономика стимулируется."],
    ]
  },
  {
    id: 2, color: "c2",
    name: "Банковские продукты и направления",
    cards: [
      ["Назови 4 основных направления банковских продуктов.", "1) Кредитование — выдача денег под процент (потребкредиты, ипотека, кредитные карты, бизнес-кредиты). 2) Депозиты и сберегательные продукты — привлечение средств клиентов (вклады, накопительные счета). 3) РКО — расчётно-кассовое обслуживание (ведение счетов, переводы, платежи). 4) Инвестиционные продукты — брокерское обслуживание, ПИФы, ИИС, облигации."],
      ["Что такое депозит? Какие виды депозитов существуют?", "Депозит (вклад) — денежные средства, переданные клиентом банку с обязательством их возврата с процентами. Виды: срочный (фиксированный срок, нельзя досрочно забрать без потери процентов), до востребования (можно снять в любой момент, ставка минимальная), накопительный счёт (гибкий — можно пополнять и снимать, ставка выше, чем у вклада до востребования). Также: пополняемые и непополняемые, с капитализацией и без."],
      ["Чем вклад до востребования отличается от срочного вклада?", "Вклад до востребования: нет фиксированного срока, деньги можно снять в любой момент, ставка минимальная (0,01-1% годовых). Срочный вклад: фиксированный срок (от 1 месяца до 3 лет), более высокая ставка (от 5 до 22% в зависимости от конъюнктуры), досрочное снятие обычно влечёт потерю процентов."],
      ["В каких валютах могут открываться депозиты? Что такое мультивалютный вклад?", "Традиционно депозиты открываются в рублях, долларах и евро. С 2022 года ряд банков ограничил валютные вклады. Также бывают вклады в юанях, франках, дирхамах. Мультивалютный вклад — это один счёт с возможностью хранить средства в нескольких валютах и конвертировать между ними без закрытия вклада."],
      ["Что такое накопительный счёт и чем он отличается от вклада?", "Накопительный счёт — банковский продукт с начислением процентов на остаток, при этом клиент может пополнять и снимать деньги в любое время без потери дохода. В отличие от срочного вклада нет фиксированного срока. В отличие от вклада до востребования — ставка заметно выше. Минус: банк может изменить ставку в одностороннем порядке."],
      ["Как банк зарабатывает на кредитовании? Что такое процентная маржа?", "Банк привлекает деньги (вклады) под одну ставку и размещает (кредиты) под более высокую. Разница называется процентной маржой (net interest margin, NIM). Например: привлёк под 8%, выдал под 18% — маржа 10 п.п. Плюс банк зарабатывает на комиссиях и сопутствующих продуктах (страховки, карты)."],
      ["Виды потребительских кредитов — назови и охарактеризуй.", "Потребительский кредит наличными (нецелевой, на любые нужды), кредитная карта (возобновляемый лимит, льготный период), автокредит (целевой, под залог авто), ипотека (под залог недвижимости, долгосрочная), POS-кредит (в точке продажи — магазин, онлайн), рефинансирование (перекредитование под меньший процент), овердрафт (краткосрочный перерасход на карте)."],
      ["Что такое РКО (расчётно-кассовое обслуживание)? Кто им пользуется?", "РКО — комплекс услуг по ведению банковского счёта: открытие и ведение счёта, проведение платёжных поручений, инкассация наличных, выдача выписок, интернет-банк для бизнеса, зарплатный проект. Основные потребители — юридические лица и ИП. Банк взимает ежемесячную комиссию за обслуживание и/или комиссию за каждую операцию."],
      ["Чем дебетовая карта отличается от кредитной?", "Дебетовая карта: привязана к собственным средствам клиента на счёте. Кредитная карта: привязана к заёмным средствам банка — клиент тратит деньги банка и возвращает их позже. У кредитной карты есть лимит, льготный период (грейс-период — обычно 50-120 дней без процентов), и процентная ставка при нарушении льготного периода. Дебетовая иногда даёт кэшбэк и проценты на остаток."],
      ["Что такое инвестиционные продукты банка? Приведи 3 примера.", "Инвестиционные продукты помогают клиенту разместить деньги с потенциально большей доходностью, чем по вкладу, но с риском. Примеры: ИИС (индивидуальный инвестиционный счёт с налоговым вычетом), ПИФ (паевой инвестиционный фонд — коллективные вложения в акции и облигации), брокерский счёт (самостоятельная торговля на бирже через банк), ИСЖ (инвестиционное страхование жизни)."],
      ["Что такое аккредитив и зачем он нужен?", "Аккредитив — форма расчётов, при которой банк-эмитент по поручению покупателя обязуется выплатить продавцу деньги только после предоставления документов, подтверждающих исполнение сделки. Снижает риск для обеих сторон: продавец уверен в оплате, покупатель — что деньги уйдут только после поставки товара."],
      ["Как работает ипотека? Что такое LTV?", "Ипотека — целевой кредит на покупку недвижимости под её залог. Клиент вносит первоначальный взнос (обычно 10-30%), банк финансирует остаток. Срок — до 30 лет. LTV (Loan-to-Value) — соотношение суммы кредита к стоимости залога. Например, квартира 10 млн, кредит 8 млн — LTV 80%. Чем выше LTV, тем выше риск для банка и обычно выше ставка."],
      ["Что такое овердрафт?", "Овердрафт — краткосрочное превышение расходов над остатком на счёте. Банк как бы «автоматически» выдаёт кредит на сумму перерасхода. Используется в основном в корпоративном банкинге (для покрытия кассовых разрывов у юрлиц) и иногда на дебетовых картах физлиц. Срок — обычно до 30-60 дней."],
      ["Чем отличаются продукты для физлиц и для юрлиц?", "Для физлиц: потребкредиты, ипотека, дебетовые и кредитные карты, вклады, накопительные счета, инвестпродукты. Для юрлиц: РКО, кредиты на пополнение оборотных средств, овердрафт, факторинг, лизинг, аккредитивы, банковские гарантии, зарплатные проекты. Корпоративный сегмент приносит банкам основной доход через комиссии и сложные продукты."],
      ["Что такое эквайринг?", "Эквайринг — услуга банка, позволяющая торговым точкам принимать оплату банковскими картами и через СБП. Торговый эквайринг — платёжные терминалы в магазинах. Интернет-эквайринг — оплата на сайтах. Банк-эквайер берёт с продавца комиссию (обычно 1,2-2,5% от суммы операции)."],
    ]
  },
  {
    id: 3, color: "c3",

    cards: [
      ["Где в банке уже применяется ИИ прямо сейчас? Назови 3-5 примеров.", "1) Кредитный скоринг — ML-модели оценивают вероятность дефолта быстрее и точнее анкеты. 2) Антифрод — обнаружение подозрительных транзакций в реальном времени. 3) Чат-боты и голосовые ассистенты — обработка обращений клиентов без оператора. 4) KYC/AML — автоматическая верификация документов и мониторинг операций. 5) Персонализация предложений — рекомендательные системы в мобильном банке."],
      ["Где ещё можно внедрить ИИ в банке — что пока не реализовано массово?", "Гиперперсонализация (предсказание жизненных событий клиента и опережающее предложение продуктов), предиктивное управление ликвидностью, автоматизация due diligence в корпоративном кредитовании, генеративный ИИ для составления юридических документов, голосовая аналитика переговоров с клиентами, ИИ-советник по инвестициям (полноценный robo-advisor на LLM)."],
      ["Как ИИ помогает в скоринге кредитных заявок?", "ML-модель анализирует сотни факторов: кредитная история, доходы, поведение в приложении, данные из соцсетей (в ряде стран). Градиентный бустинг (XGBoost, LightGBM) выявляет нелинейные зависимости, которые недоступны традиционным скоринговым картам. Результат — более точная оценка риска, снижение числа дефолтов и расширение выдачи для хороших заёмщиков."],
      ["Что такое чат-бот в банке и какую ценность он несёт?", "Чат-бот — это программа, имитирующая диалог с оператором. В банке обрабатывает: баланс, блокировку карты, статус заявки, платёжные документы. Ценность: снижение нагрузки на колл-центр (обычно 30-50% обращений закрывается ботом), круглосуточная доступность, снижение стоимости обслуживания. Современные боты на LLM могут понимать свободный текст и вести сложный диалог."],
      ["Как ИИ используется для борьбы с мошенничеством (антифрод)?", "Антифрод-система анализирует каждую транзакцию в реальном времени: нетипичная сумма, новый MCC, другой город, нестандартное время суток, несовпадение устройства. ML-модель присваивает транзакции риск-скор. При высоком риске — транзакция блокируется или клиенту приходит push-уведомление для подтверждения. Ключевое требование — решение за <200 мс."],
      ["Что такое персонализация продуктов и как ИИ помогает её реализовать?", "Персонализация — предложение нужного продукта нужному клиенту в нужный момент. ИИ анализирует транзакционную историю (клиент начал тратить на детские товары — предложить детскую карту), жизненные события (ипотека закрыта — предложить ремонтный кредит). Рекомендательные системы (collaborative и content-based filtering) повышают конверсию в 2-5 раз по сравнению с массовыми рассылками."],
      ["Назови плюсы внедрения ИИ в банке для клиента.", "Быстрое решение по кредиту (минуты вместо дней), круглосуточный умный чат-бот, персональные предложения вместо спама, мгновенное выявление мошенничества, голосовое управление банком. В итоге — удобство, скорость, безопасность."],
      ["Назови плюсы внедрения ИИ в банке для самого банка.", "Снижение операционных затрат (меньше операторов), рост качества кредитного портфеля (ниже дефолты), рост конверсии (персонализация), автоматизация compliance (AML, KYC), конкурентное преимущество и удержание клиентов. По оценкам McKinsey, ИИ может сгенерировать для банков дополнительные 200-340 млрд долларов ценности в год глобально."],
      ["Какие риски несёт использование ИИ в банковской сфере?", "Предвзятость модели (bias) — дискриминация по возрасту, полу, региону. Непрозрачность (black box) — регулятор требует объяснимости решений. Риск adversarial attacks — мошенники могут обмануть модель. Зависимость от качества данных. Регуляторные риски — ЦБ требует валидации моделей. Операционный риск — сбой модели может остановить кредитование."],
      ["Что такое open banking и как он связан с ИИ?", "Open banking — концепция, при которой банк через API предоставляет сторонним приложениям (с согласия клиента) доступ к данным о транзакциях и счётах. В РФ аналог — ЦБ развивает Открытые API и Открытые финансы. ИИ получает из open banking дополнительные данные для скоринга и персонализации. Пример: агрегатор PFM (personal finance management) анализирует расходы из нескольких банков."],
      ["Как ИИ помогает в управлении рисками?", "Кредитный риск: ML-скоринг снижает вероятность одобрения плохих заёмщиков. Рыночный риск: алгоритмические системы мониторят портфели в реальном времени. Операционный риск: аномалии в поведении сотрудников (fraud detection внутри банка). Ликвидностный риск: предиктивные модели прогнозируют отток вкладов."],
      ["Что такое robo-advisor?", "Robo-advisor — автоматизированный сервис инвестиционного консультирования на основе алгоритмов. Клиент указывает горизонт инвестирования и риск-профиль, система формирует и автоматически ребалансирует портфель. В России развивают Тинькофф Инвестиции, Сбер (СберИнвестор). Стоимость услуги в 5-10 раз ниже, чем у персонального брокера."],
      ["Как банки используют ИИ для работы с просроченной задолженностью?", "Предиктивные модели выявляют клиентов с риском просрочки за 1-3 месяца до события. Банк превентивно предлагает реструктуризацию. Автодозвон (IVR + голосовой бот) напоминает о платеже. Модели определяют оптимальное время и канал контакта для каждого должника — это повышает собираемость и снижает затраты на взыскание."],
      ["Что такое OCR и где его применяют в банке?", "OCR (Optical Character Recognition) — технология распознавания текста с изображений. В банке: автоматическое распознавание паспортов и документов при открытии счёта (KYC), обработка платёжных поручений на бумаге, распознавание чеков и квитанций в PFM-приложениях, обработка входящей документации в корпоративном банкинге."],
      ["Что такое NLP и приведи пример применения в банке.", "NLP (Natural Language Processing) — обработка естественного языка. Примеры в банке: классификация обращений в колл-центре (тема жалобы → нужный отдел), анализ тональности отзывов клиентов, автоматическое извлечение данных из кредитных договоров, чат-боты на основе LLM, синтез речи для IVR-систем."],
    ]

  {
    id: 4, color: "c4",
    name: "Инструменты: Jira и Confluence",
    cards: [
      ["Что такое Jira и для чего она используется?", "Jira — система управления проектами и задачами от Atlassian. Используется для трекинга задач разработки, баг-репортинга, планирования спринтов, ведения бэклога и управления проектами по Scrum и Kanban. Каждая единица работы в Jira — тикет (issue). У каждого тикета есть тип, статус, исполнитель, приоритет, дедлайн."],
      ["Что такое Confluence (Wiki) и чем отличается от Jira?", "Confluence — корпоративная вики-система от Atlassian для документирования. В Jira — задачи и их выполнение. В Confluence — знания: технические спецификации, регламенты, архитектурные решения, онбординг-материалы, meeting notes. Confluence организован в пространства (spaces) → страницы (pages) с иерархией. Jira и Confluence плотно интегрированы: тикет можно слинковать со страницей."],
      ["Как создать тикет в Jira? Что в нём нужно указать?", "Создание: кнопка «Create» → выбор проекта. Обязательные поля: тип задачи (Story/Task/Bug/Epic), краткое название (Summary), описание (Description). Полезно указать: Assignee (исполнитель), Reporter (кто создал), Priority (приоритет), Sprint (к какому спринту), Story Points (оценка трудозатрат), Labels/Components (теги)."],
      ["Как запросить создание пространства в Confluence?", "Нужно создать тикет в Jira в проект техподдержки (Service Desk / IT Support). Тип тикета — обычно Request или Task. В описании: название нового пространства, цель, список пользователей с нужными правами доступа, ответственный за пространство. После обработки тикета администратор Confluence создаёт пространство и выдаёт доступ."],
      ["Что такое Epic, Story, Task, Bug в Jira? Чем они отличаются?", "Epic — большая инициатива, объединяющая несколько Story (например, «Переработка онбординга»). Story (User Story) — функция с точки зрения пользователя («Как клиент, я хочу получать push о каждой транзакции»). Task — конкретное техническое задание без пользовательского контекста. Bug — дефект, отклонение от ожидаемого поведения. Subtask — подзадача любого из типов."],
      ["Что такое спринт в Jira и как он организуется?", "Спринт — фиксированный итерационный цикл разработки (обычно 1-2 недели). Организуется через Scrum Board в Jira. Процесс: Sprint Planning (отбираем задачи из бэклога в спринт) → Daily Standup (ежедневная синхронизация) → Sprint Review (демо результатов) → Retrospective (что улучшить). Незавершённые задачи уходят в следующий спринт или бэклог."],
      ["Как выглядит типичный Kanban board в Jira?", "Kanban board — доска с колонками, каждая отражает статус задачи. Типичные колонки: To Do → In Progress → In Review → Done. Задачи перемещаются по колонкам. Ключевое отличие от Scrum: нет спринтов, постоянный поток задач, акцент на WIP-лимитах (ограничение числа задач в работе одновременно для предотвращения перегрузки)."],
      ["Что такое backlog в Jira?", "Бэклог — упорядоченный список всех запланированных задач проекта, которые ещё не взяты в спринт. Product Owner приоритизирует бэклог — самые важные задачи наверху. Бэклог Refinement (груминг) — регулярная сессия команды по уточнению и оценке задач в бэклоге. Задачи в бэклоге могут не иметь чёткого дедлайна."],
      ["Чем отличается Jira Software от Jira Service Management?", "Jira Software — для команд разработки: спринты, бэклог, Kanban/Scrum. Jira Service Management (бывший Jira Service Desk) — для IT-поддержки и сервисных команд: обработка заявок от пользователей (SLA, очереди, порталы самообслуживания). По сути — ITSM-система. Если пользователь пишет в поддержку «у меня не работает доступ», его обращение создаётся в JSM."],
      ["Зачем нужна иерархия страниц в Confluence?", "Иерархия (пространство → раздел → страница → дочерние страницы) помогает структурировать знания: легко найти нужный документ, настроить права доступа на уровне раздела, поддерживать навигацию. Хорошая структура: пространство по продукту или команде, разделы по темам (архитектура, процессы, онбординг), страницы — конкретные документы."],
      ["Что такое assignee и reporter в тикете Jira?", "Reporter — человек, который создал тикет (автор обращения). Assignee — человек, ответственный за выполнение задачи. В сервисных командах: пользователь = reporter, IT-специалист = assignee. Важно не путать: reporter не обязан выполнять задачу, assignee не обязан быть её автором."],
      ["Что такое workflow в Jira? Опиши стандартный.", "Workflow — набор статусов и переходов между ними, которые отражают жизненный цикл задачи. Стандартный: Open → In Progress → In Review → Done (или Closed). Дополнительные статусы: Blocked, On Hold, Rejected, Reopened. Переходы могут иметь условия (например, задача не может перейти в Done без заполнения поля Resolution) и триггеры (автоматические действия)."],
    ]
  },
  {
    id: 5, color: "c5",
    name: "Разработка: фронт, бэк, мобилка, архитектура",
    cards: [
      ["Чем отличается фронтенд от бэкенда?", "Фронтенд — всё, что видит пользователь: интерфейс в браузере или приложении. Бэкенд — серверная часть: бизнес-логика, работа с базой данных, API. Фронтенд взаимодействует с бэкендом через API-запросы. Аналогия: фронтенд — витрина магазина, бэкенд — склад и бухгалтерия."],
      ["Какие языки используются на фронтенде? На бэкенде?", "Фронтенд: HTML (структура), CSS (стили), JavaScript/TypeScript (логика). Бэкенд: Java (Spring), Python (Django, FastAPI), Go, C# (.NET), Node.js (JavaScript), PHP, Ruby. Выбор языка зависит от задачи: Java и C# — в энтерпрайзе и банках, Python — в ML и аналитике, Go — в высоконагруженных сервисах."],
      ["Что такое мобильная разработка? Чем native отличается от cross-platform?", "Native: приложение написано на языке платформы — Swift/Objective-C для iOS, Kotlin/Java для Android. Максимальная производительность, доступ ко всем API устройства, но два отдельных кода. Cross-platform: один код — два приложения. Flutter (Dart от Google), React Native (JavaScript). Быстрее в разработке, но могут быть ограничения по производительности и UI-тонкостям."],
      ["Назови 2-3 фреймворка для фронтенда и объясни зачем они нужны.", "React (Meta) — библиотека для построения UI на компонентах, виртуальный DOM, огромная экосистема. Vue.js — прогрессивный фреймворк, проще в старте, реактивность из коробки. Angular (Google) — полноценный фреймворк с типизацией (TypeScript), строгой структурой, популярен в корпоративных приложениях. Зачем: без фреймворка сложно управлять состоянием и переиспользовать компоненты в больших приложениях."],
      ["Что такое API? Объясни простыми словами.", "API (Application Programming Interface) — интерфейс взаимодействия между программами. Это как меню в ресторане: ты не знаешь, что происходит на кухне, но знаешь, что можно заказать и в каком формате получишь. Фронтенд делает запрос к API бэкенда (например, GET /user/123), бэкенд возвращает данные (JSON с информацией о пользователе)."],
      ["Чем REST API отличается от GraphQL?", "REST: каждый ресурс — отдельный endpoint (GET /users, POST /orders). Данные возвращаются в фиксированной структуре — иногда лишние, иногда нужно несколько запросов. GraphQL: один endpoint, клиент сам задаёт структуру ответа — запрашивает только нужные поля. Удобен для сложных UI с разными потребностями данных. REST — проще, понятнее, GraphQL — гибче."],
      ["Что такое микросервисная архитектура и чем она отличается от монолита?", "Монолит: всё приложение — один деплой. Просто в разработке, сложно масштабировать. Микросервисы: приложение разбито на маленькие независимые сервисы (авторизация, платежи, уведомления), каждый деплоится и масштабируется отдельно. Минусы микросервисов: сложная оркестрация, сетевые задержки, сложнее отлаживать. Банки переходят с монолита на микросервисы для гибкости."],
      ["Что такое Git и зачем он нужен?", "Git — система контроля версий. Позволяет командам параллельно работать над кодом, сохранять историю изменений, откатываться к предыдущим версиям, сливать ветки. Каждый разработчик работает в своей ветке и делает коммиты. Git — основа современной разработки. Популярные хостинги: GitHub, GitLab, Bitbucket."],
      ["Назови основные ветки в Git и опиши их назначение.", "main (master) — стабильный продакшн-код. develop — ветка активной разработки, куда сливаются фичи. feature/xxx — ветка для конкретной фичи (например, feature/add-payment). release/xxx — ветка подготовки релиза (тестирование, хотфиксы). hotfix/xxx — срочный фикс прямо в main. Это GitFlow — один из популярных подходов к ветвлению."],
      ["Что такое code review и зачем его проводить?", "Code review — процесс проверки кода одного разработчика другим до слияния в основную ветку. Цели: поймать баги, проверить соответствие стандартам, поделиться знаниями, не допустить технического долга. Обычно реализуется через Pull Request / Merge Request в GitHub/GitLab. Ревьюер оставляет комментарии, автор исправляет, затем PR мержится."],
      ["Что такое SonarQube и что он проверяет?", "SonarQube — инструмент статического анализа кода. Автоматически проверяет: code smells (запахи кода — плохие паттерны), bugs (потенциальные ошибки), vulnerabilities (уязвимости безопасности), duplications (дублирование кода), test coverage (покрытие тестами). Интегрируется в CI/CD пайплайн — при каждом PR автоматически анализирует изменения."],
      ["Что такое CI/CD и как это связано с Git?", "CI (Continuous Integration) — автоматическая сборка и тестирование кода при каждом push или merge. CD (Continuous Delivery/Deployment) — автоматический деплой в тестовую или продакшн-среду. Связь с Git: при push в ветку или merge в develop/main запускается пайплайн (GitHub Actions, GitLab CI, Jenkins). Цель — быстро выявить проблемы и автоматизировать рутину."],
      ["Что такое Docker и зачем он нужен разработчику?", "Docker — технология контейнеризации. Позволяет упаковать приложение со всеми зависимостями в контейнер, который одинаково работает на любой машине. Решает проблему «у меня работает, у тебя нет». Контейнер — изолированная среда выполнения. Docker Compose — запуск нескольких контейнеров (приложение + база данных + Redis)."],
      ["Что такое endpoint в REST API?", "Endpoint — конкретный URL, по которому доступен ресурс или действие в API. Например: GET /api/v1/accounts/{id} — получить данные счёта. POST /api/v1/payments — создать платёж. DELETE /api/v1/cards/{id} — удалить карту. Endpoint = метод HTTP + путь. Совокупность всех endpoints — это контракт API."],
      ["Чем HTTP методы GET, POST, PUT, DELETE отличаются друг от друга?", "GET — получить данные (не изменяет состояние, идемпотентен). POST — создать новый ресурс (не идемпотентен: два одинаковых запроса создадут два объекта). PUT — полностью заменить ресурс по ID (идемпотентен). PATCH — частично обновить ресурс. DELETE — удалить ресурс. Правильное использование методов — основа REST-дизайна."],
    ]
  },
  {
    id: 6, color: "c6",
    name: "Тестирование",
    cards: [
      ["Кто такой QA-инженер и какую ценность он несёт команде?", "QA (Quality Assurance) инженер — специалист, обеспечивающий качество продукта. Ценность: выявляет баги до попадания в продакшн (дешевле исправить на этапе разработки, чем после релиза), проверяет соответствие требованиям, улучшает процессы. QA — это не только «нажать на кнопки», но и анализ требований, написание тест-кейсов, участие в планировании."],
      ["Чем QA отличается от AQA (automation QA)?", "QA (Manual QA) — тестирует вручную: исследует продукт, выполняет тест-кейсы, эксплораторно ищет баги. AQA (Automation QA) — пишет автотесты: скрипты, которые выполняют проверки автоматически. AQA работает с Selenium, Playwright, Cypress, Appium. Автотесты запускаются в CI/CD при каждом деплое и быстро проверяют регрессию."],
      ["Что такое Fullstack QA?", "Fullstack QA — тестировщик, который умеет работать и на уровне UI (фронтенд, мобилка), и на уровне API (Postman, RestAssured), и на уровне базы данных (SQL-запросы). Это не обязательно значит «умеет писать фронт и бэк» — это значит, что QA тестирует систему комплексно, понимая весь стек."],
      ["Назови основные виды тестирования (классификация по типу).", "По цели: функциональное (проверяет бизнес-логику) и нефункциональное (производительность, безопасность, удобство). По степени автоматизации: ручное и автоматизированное. По уровню: unit, integration, system, acceptance. По знанию системы: белый ящик (знаем код), чёрный ящик (не знаем), серый ящик. По типу изменений: регрессионное, санитарное, smoke."],
      ["Чем функциональное тестирование отличается от нефункционального?", "Функциональное: проверяет, что система делает то, что должна. «Кнопка оплаты создаёт транзакцию». Нефункциональное: проверяет, КАК система это делает. «Кнопка оплаты обрабатывает 1000 запросов в секунду без деградации». Нефункциональное включает: производительность, надёжность, безопасность, масштабируемость, доступность, удобство использования."],
      ["Что такое нагрузочное тестирование? Когда оно нужно?", "Нагрузочное (load testing) — проверяет поведение системы под ожидаемой и пиковой нагрузкой. Виды: Load test (нормальная нагрузка), Stress test (нагрузка выше нормы — до какого предела выдержит), Spike test (резкий скачок нагрузки), Soak test (длительная нагрузка — поиск утечек памяти). Нужно перед крупными релизами, акциями, масштабированием. Инструменты: JMeter, Gatling, k6."],
      ["Что такое регрессионное тестирование?", "Регрессионное тестирование — проверка того, что новые изменения не сломали существующую функциональность. После каждого релиза прогоняется набор тест-кейсов по всему продукту. Автоматизация критична: вручную прогонять весь регресс при каждом деплое нереально. Именно для регрессии строятся большие suite автотестов."],
      ["Что такое smoke-тестирование?", "Smoke-тест (дымовое тестирование) — минимальный набор проверок базовой работоспособности системы после деплоя. «Сервис запустился, главная страница открывается, авторизация работает, ключевой бизнес-сценарий проходит». Если smoke упал — сборка отправляется на исправление, не тратя время на полное тестирование. Аналогия: включить чайник перед тем, как ставить чай."],
      ["Какие инструменты использует тестировщик? Назови 5+.", "Jira (трекинг багов и задач), TestRail или Zephyr (тест-менеджмент), Postman (тестирование API), Selenium / Playwright / Cypress (автотесты UI), JMeter / k6 (нагрузочное), Charles / Fiddler (перехват и анализ HTTP-трафика), BrowserStack / Sauce Labs (кросс-браузерное тестирование), SQL-клиент (DBeaver, DataGrip) для проверки данных в БД."],
      ["Что такое тест-кейс? Что в нём должно быть?", "Тест-кейс — пошаговое описание проверки конкретного сценария. Обязательные поля: ID и название, предусловия (что должно быть настроено перед тестом), шаги (что нужно сделать), ожидаемый результат (что должно произойти), фактический результат (заполняется при выполнении), статус (Pass/Fail/Blocked/Skip), приоритет."],
      ["Что такое баг-репорт и как он выглядит?", "Баг-репорт — документ, описывающий найденный дефект. Структура: заголовок (краткое описание бага), окружение (версия ПО, ОС, браузер), шаги воспроизведения (пошагово как получить баг), ожидаемый результат, фактический результат, серьёзность (Blocker/Critical/Major/Minor/Trivial), приоритет, скриншоты/видео/логи. Хороший баг-репорт воспроизводится разработчиком без уточняющих вопросов."],
      ["Чем верификация отличается от валидации?", "Верификация (Verification) — «Правильно ли мы строим продукт?» Проверка соответствия продукта спецификации и требованиям. Делается разработчиками и QA на этапе разработки. Валидация (Validation) — «Правильный ли продукт мы строим?» Проверка того, что продукт решает реальные проблемы пользователя. Делается с реальными пользователями. Баг — нарушение верификации. Плохой UX — нарушение валидации."],
      ["Что такое тест-план и зачем он нужен?", "Тест-план — документ, описывающий стратегию тестирования для проекта или фичи. Включает: объём тестирования (что тестируем и что нет), виды тестирования, ресурсы (кто тестирует), сроки, риски, критерии завершения тестирования, инструменты. Помогает команде договориться о подходе и зафиксировать ожидания."],
      ["Что такое тестовое покрытие (coverage)?", "Тестовое покрытие — метрика, показывающая, какой процент кода или функциональности покрыт тестами. Code coverage (покрытие кода) — какой % строк кода выполняется при прогоне тестов. Requirements coverage — какой % требований проверяется тест-кейсами. Цель не 100% (нереально и нецелесообразно), а покрытие критических путей и рисковых мест."],
      ["Назови уровни тестирования (unit, integration, system, acceptance).", "Unit (модульное) — тест отдельной функции/метода, без зависимостей (моки). Быстро, дёшево, много. Integration — тест взаимодействия компонентов (сервис + БД, сервис + API). System — тест всей системы целиком в боевом окружении. Acceptance (UAT, User Acceptance Testing) — конечный пользователь или заказчик проверяет, что система решает его задачи. Пирамида тестирования: снизу много unit, сверху мало E2E."],
    ]
  },
  {
    id: 7, color: "c7",
    name: "Аналитика",
    cards: [
      ["Кто такой бизнес-аналитик (BA) и чем он занимается?", "Бизнес-аналитик — связующее звено между бизнесом и разработкой. Задача: понять потребность бизнеса, формализовать её в требования, которые поймут разработчики. BA собирает требования, описывает бизнес-процессы, составляет документацию (BRD, User Stories), участвует в приёмке, коммуницирует со стейкхолдерами. Без BA разработчики часто делают «не то»."],
      ["Чем системный аналитик отличается от бизнес-аналитика?", "BA (бизнес-аналитик) работает на уровне бизнес-требований: что нужно бизнесу. SA (системный аналитик) работает на уровне системных требований: как это реализовать технически. SA проектирует структуру данных, описывает API-контракты, пишет технические спецификации, понимает архитектуру системы. В маленьких командах один человек может совмещать обе роли."],
      ["Что такое продуктовый аналитик?", "Продуктовый аналитик работает с данными о поведении пользователей для принятия продуктовых решений. Задачи: A/B тесты, построение воронок, анализ ретеншна, метрики (DAU, MAU, конверсия, LTV), дашборды. Инструменты: SQL, Amplitude, Mixpanel, Tableau, Python. Ближе к Data Analyst, чем к BA."],
      ["Как аналитик собирает требования? Назови 4-5 техник.", "1) Интервью со стейкхолдерами — открытые вопросы для понимания болей и целей. 2) Воркшопы — групповые сессии для выработки решений. 3) Анкетирование — письменный опрос большой аудитории. 4) Наблюдение (job shadowing) — изучение работы пользователя «вживую». 5) Анализ документов — изучение существующих регламентов, интерфейсов, отчётов. 6) Прототипирование — создание макетов для уточнения требований через обратную связь."],
      ["Что такое функциональные и нефункциональные требования?", "Функциональные требования описывают, что система должна делать: «Система должна позволять пользователю сбросить пароль через SMS». Нефункциональные описывают, как она должна это делать: «Система должна обрабатывать 500 запросов в секунду», «Время отклика — не более 2 секунд», «Доступность — 99,9%». NFR часто забывают — и потом получают медленную или ненадёжную систему."],
      ["Что такое User Story? Напиши пример.", "User Story — краткое описание функциональности с точки зрения пользователя. Шаблон: «Как [роль], я хочу [действие], чтобы [ценность/цель]». Пример: «Как зарегистрированный клиент банка, я хочу получать push-уведомление о каждой транзакции по карте, чтобы контролировать расходы в реальном времени». К User Story прилагаются Acceptance Criteria — критерии приёмки."],
      ["Что такое BRD и SRS?", "BRD (Business Requirements Document) — документ бизнес-требований: описывает цели проекта, проблемы, которые он решает, и требования с точки зрения бизнеса. Для стейкхолдеров и бизнеса. SRS (Software Requirements Specification) — техническая спецификация: детальное описание функциональных и нефункциональных требований для команды разработки."],
      ["Что такое Use Case диаграмма? Где применяется?", "Use Case диаграмма (UML) — визуализация взаимодействий пользователей (акторов) с системой. Показывает: кто использует систему, какие действия (use cases) они могут выполнять, какие случаи связаны между собой (include, extend). Применяется для согласования функциональных требований со стейкхолдерами — понятна без технических знаний."],
      ["Что такое BPMN и зачем аналитику его знать?", "BPMN (Business Process Model and Notation) — стандарт для графического описания бизнес-процессов. Элементы: события (кружки), задачи (прямоугольники), шлюзы-развилки (ромбы), потоки (стрелки), дорожки (lanes — кто выполняет). Нужен аналитику для описания «как есть» (As-Is) и «как должно быть» (To-Be) процессов. Инструменты: Bizagi, draw.io, Miro."],
      ["Чем ER-диаграмма отличается от BPMN?", "BPMN описывает бизнес-процессы (последовательность действий, кто и что делает). ER-диаграмма (Entity-Relationship) описывает структуру данных: сущности (таблицы БД) и связи между ними. ER — инструмент системного аналитика и разработчика для проектирования базы данных. Аналогия: BPMN — «как работает процесс», ER — «как хранятся данные»."],
      ["Что такое прототип и как он помогает аналитику?", "Прототип — наглядная модель будущего продукта. Lo-fi прототип (wireframe) — схематичные экраны без дизайна, создаются в Figma, Balsamiq, Miro. Hi-fi прототип — точный макет с дизайном, близкий к финальному продукту. Прототип помогает: уточнить требования (стейкхолдер видит, а не читает), выявить противоречия до написания кода, согласовать UX-сценарии."],
      ["Что такое acceptance criteria?", "Acceptance Criteria (критерии приёмки) — условия, при выполнении которых задача считается завершённой. Прилагаются к каждой User Story. Формат Given-When-Then: Given (условие) — When (действие) — Then (результат). Пример: Given клиент авторизован, When он нажимает «Заблокировать карту», Then карта блокируется и приходит push-уведомление в течение 5 секунд."],
      ["Что такое stakeholder и зачем с ним работать?", "Стейкхолдер — любое лицо или группа, заинтересованные в проекте или его результатах. Типы: бизнес-заказчик (финансирует, определяет цели), конечный пользователь (использует продукт), разработчик (строит), регулятор (надзирает). Аналитик должен выявить всех стейкхолдеров, понять их интересы и противоречия, управлять ожиданиями через коммуникацию."],
      ["Назови артефакты, которые создаёт аналитик в проекте.", "BRD, SRS, User Stories с Acceptance Criteria, Use Case диаграммы, BPMN-схемы процессов, ER-диаграммы, wireframes/прототипы (совместно с дизайнером), тест-сценарии для UAT, матрица трассируемости требований (RTM — связь требований и тест-кейсов), глоссарий проекта, протоколы встреч."],
      ["Что такое gap-анализ?", "Gap-анализ — сравнение текущего состояния (As-Is) с целевым (To-Be) для выявления разрывов (gaps). Аналитик фиксирует: что есть сейчас, что нужно получить, чего не хватает. Результат — список изменений, которые нужно сделать. Применяется при анализе бизнес-процессов, внедрении новых систем, анализе конкурентов."],
    ]
  },
  {
    id: 8, color: "c8",
    name: "Дизайн",
    cards: [
      ["Кто такой UX-дизайнер и чем занимается?", "UX (User Experience) дизайнер занимается проектированием пользовательского опыта. Его задача — сделать взаимодействие с продуктом удобным, понятным и приятным. UX-дизайнер: исследует пользователей (интервью, наблюдение), строит пользовательские сценарии и карты пути (CJM), создаёт wireframes и прототипы, проводит usability-тестирование, формирует требования к интерфейсу."],
      ["Чем UX отличается от UI?", "UX — это опыт: как пользователь себя чувствует при использовании продукта, насколько удобны сценарии. UI (User Interface) — это визуальная и интерактивная оболочка: цвета, шрифты, иконки, кнопки, анимации. UX без хорошего UI — удобно, но некрасиво. UI без UX — красиво, но непонятно. Хороший продукт сочетает оба."],
      ["Кто такой продуктовый дизайнер?", "Продуктовый дизайнер — расширенная роль, объединяющая UX и UI. Он занимается не только созданием интерфейсов, но и продуктовой стратегией: понимает метрики, участвует в приоритизации фич, тесно работает с PM и разработкой. В отличие от чистого UI-дизайнера, продуктовый дизайнер думает о влиянии дизайн-решений на бизнес-результаты."],
      ["Чем веб-дизайн отличается от мобильного дизайна?", "Веб: большой экран, мышь/клавиатура, hover-состояния, сложные навигационные структуры, много информации на экране. Мобилка: маленький экран (~390px), тач-управление (минимум 44px зоны нажатия), нет hover, паттерн «большой палец» (thumb zone), вертикальная прокрутка. Шрифты крупнее, меньше элементов на экране, другие навигационные паттерны (bottom tab bar, drawer)."],
      ["Что такое адаптивный дизайн (responsive design)?", "Responsive design — подход, при котором интерфейс перестраивается под размер экрана. Реализуется через CSS media queries и гибкую сетку. Breakpoints (контрольные точки): обычно 320px (mobile), 768px (tablet), 1024px (desktop), 1440px (wide). Дизайн изначально проектируется для мобилки (mobile-first), затем масштабируется на большие экраны."],
      ["Что такое design system и зачем она нужна?", "Design system — библиотека переиспользуемых компонентов, токенов и гайдлайнов. Включает: цветовую палитру, типографику, сетку, базовые компоненты (кнопки, поля ввода, карточки), паттерны поведения. Зачем: дизайнеры не рисуют каждый экран с нуля, разработчики используют готовые компоненты, продукт выглядит консистентно. Примеры: Material Design (Google), Polaris (Shopify), Ant Design."],
      ["Что такое wireframe и чем он отличается от прототипа?", "Wireframe — схематичный скелет экрана: расположение блоков, иерархия контента, без цветов и деталей дизайна. Быстро создаётся карандашом или в Figma/Balsamiq. Прототип — кликабельная модель с переходами между экранами, имитирующая реальное поведение приложения. Lo-fi прототип — wireframe с переходами. Hi-fi — точный макет с дизайном, близкий к финалу."],
      ["Что такое UX research? Какие методы используются?", "UX research — изучение пользователей для принятия дизайн-решений. Методы: качественные (интервью, usability testing, card sorting, дневниковое исследование) и количественные (опросы, A/B тесты, аналитика поведения, heatmaps). Результат: понимание задач пользователей, болей, ментальных моделей. Без research дизайнер проектирует «для себя», а не для пользователя."],
      ["Что такое usability testing?", "Usability testing — наблюдение за тем, как реальные пользователи выполняют задачи в продукте. Дизайнер/исследователь наблюдает, задаёт вопросы, фиксирует проблемы. Формат: модерируемое (с фасилитатором) или немодерируемое (онлайн-инструменты: Maze, Useberry). Позволяет найти проблемы, которые дизайнер не замечает — потому что он уже знает, как работает интерфейс."],
      ["Чем дизайнер в банке отличается от дизайнера в продуктовой компании?", "В банке: строгие регуляторные требования (обязательные уведомления, предупреждения, согласия), высокие требования к безопасности и доверию, сложные операции с деньгами нельзя делать «слишком просто» (нужны подтверждения), legacy-системы и консервативная корпоративная культура. В продуктовой компании: больше свободы в экспериментах, быстрые итерации, прямой доступ к данным пользователей."],
      ["Что такое accessibility (доступность) в дизайне?", "Accessibility — проектирование интерфейсов, доступных для людей с ограниченными возможностями. Стандарт: WCAG (Web Content Accessibility Guidelines). Основные требования: достаточный контраст текста (минимум 4,5:1 для обычного текста), поддержка screen readers (alt-тексты, ARIA-метки), управление с клавиатуры, не только цвет как единственный индикатор. В банках важно — пожилые пользователи и пользователи с нарушениями зрения."],
    ]

  {
    id: 9, color: "c9",
    name: "Работа с задачами",
    cards: [
      ["Как организовать свои задачи? Какой инструмент использовать?", "Основные инструменты: Notion, Jira, Todoist, Trello, Linear, TickTick. Логика организации: разбить задачи по проектам/контекстам, разделить рабочие и личные задачи, отмечать прогресс. Важно: показать систему, а не хаос. Выбор зависит от контекста: Jira — для командной разработки, Notion — гибкое рабочее пространство, Todoist — удобный личный таск-менеджер."],
      ["Как приоритизировать задачи? Назови конкретный фреймворк.", "Популярные фреймворки: Матрица Эйзенхауэра (срочно/важно), MoSCoW (Must/Should/Could/Won't), RICE (Reach, Impact, Confidence, Effort — числовой скор), ICE (Impact, Confidence, Ease). Для личного use case обычно достаточно Эйзенхауэра: Q1 (срочно+важно) — делаю сразу, Q2 (важно, не срочно) — планирую блоки времени, Q3 (срочно, не важно) — делегирую, Q4 — откладываю."],
      ["Что такое матрица Эйзенхауэра?", "Матрица из 4 квадрантов по двум осям — срочность и важность. Q1: Срочно + Важно (кризис, дедлайны) → делать немедленно. Q2: Не срочно + Важно (развитие, планирование) → выделять время. Q3: Срочно + Не важно (отвлечения, чужие запросы) → делегировать. Q4: Не срочно + Не важно (соцсети, рутина без ценности) → сокращать или исключать. Ключевой инсайт: продуктивные люди максимизируют время в Q2."],
      ["Как вести календарь? Какие типы событий в него попадают?", "В хорошей практике в календарь попадают: встречи и звонки (с чёткими временными блоками), time-blocked слоты для глубокой работы (Deep Work блоки), дедлайны (как events в конце дня), личные задачи и обязательства. Разделение: рабочий и личный календари (цветовая кодировка). Важно: calendar blocking — планировать не только встречи, но и работу."],
      ["Чем Kanban-доска отличается от Scrum-доски?", "Kanban: нет спринтов, непрерывный поток, WIP-лимиты (ограничение задач в работе), задачи добавляются по мере появления. Метрика: Cycle Time (время от начала до конца задачи). Scrum: работа спринтами (1-2 нед), планирование и ретро, Velocity (SP за спринт), задачи фиксируются на спринт. Kanban — для операционной работы, Scrum — для продуктовой разработки с итерациями."],
      ["Как разбить большую задачу на подзадачи?", "Декомпозиция: 1) Определить конечный результат. 2) Выделить независимые блоки работы. 3) Каждый блок — не больше 1-4 часов работы. 4) Убедиться, что каждую подзадачу можно считать выполненной (Definition of Done). Техника Work Breakdown Structure (WBS): иерархическое дерево от цели до атомарных задач. В Jira: Epic → Story → Task → Subtask."],
      ["Что такое time-blocking?", "Time-blocking — техника планирования, при которой ты заранее резервируешь конкретные слоты в календаре под конкретные задачи. Например: 9:00-11:00 — глубокая работа по проекту X, 11:00-11:30 — почта и сообщения, 14:00-15:00 — встречи. Преимущества: защищаешь время для важных задач, реалистично оцениваешь свою ёмкость, снижаешь переключение контекста."],
      ["Как отслеживать дедлайны?", "Лучшая практика: дедлайн сразу в календарь и в таск-менеджер. За 2-3 дня до дедлайна — напоминание. Если задач много — недельный review в пятницу/понедельник: что дедлайнит на этой неделе? Буфер: планировать завершение за день до официального дедлайна. Для командных дедлайнов — дедлайн в Jira + уведомление стейкхолдерам."],
      ["Что делать, если задач стало больше, чем можешь выполнить?", "1) Приоритизировать через MoSCoW или RICE — оставить только Must Have. 2) Открыто коммуницировать с менеджером/заказчиком — «у меня X задач, какая важнее?». 3) Делегировать, если есть кому. 4) Договориться о переносе дедлайнов — лучше сказать заранее, чем сорвать молча. 5) Отказаться от низкоприоритетных задач. Главный принцип: управлять ожиданиями, а не молча тонуть."],
      ["Как выглядит типичный рабочий день с точки зрения задач?", "Рекомендуемая структура: утром — review задач и приоритизация, первые 2-3 часа — Deep Work (сложные задачи без отвлечений), после обеда — встречи и коммуникация, конец дня — разгрести входящие, записать прогресс, обновить задачи. Разделение дня: 3 главные задачи + операционная работа + коммуникация. Показываешь систему, а не импровизацию."],
    ]

  {
    id: 10, color: "c1",
    name: "Технические основы (Junior PM Guide)",
    cards: [
      ["Чем фронтенд отличается от бэкенда?", "Фронтенд — всё, что видит пользователь: интерфейс в браузере или приложении. Бэкенд — серверная часть: бизнес-логика, работа с базой данных, API. То, что видит пользователь — фронтенд. Всё, что происходит «за дверями» — бэкенд."],
      ["Что такое API?", "API (Application Programming Interface) — описание способов взаимодействия программ между собой: набор классов, процедур, функций, структур. API позволяет одной программе взаимодействовать с другой. REST API — набор правил общения между клиентом и сервером по HTTP."],
      ["Чем REST отличается от SOAP?", "REST — архитектурный стиль, работает поверх HTTP, использует JSON, лёгкий и гибкий. SOAP — протокол с жёсткой структурой XML-сообщений, более сложный, но с поддержкой транзакций и безопасности. REST популярнее для веб- и мобильных приложений; SOAP используется в корпоративных и банковских системах."],
      ["Назови HTTP-методы и их назначение.", "GET — получить данные (список контактов). POST — создать новый ресурс (добавить друга). PUT — полностью обновить ресурс. PATCH — частично обновить ресурс. DELETE — удалить ресурс. OPTIONS — узнать, какие методы доступны. HEAD — получить заголовки без тела ответа."],
      ["Что такое JSON и XML? Чем отличаются?", "JSON (JavaScript Object Notation) — лёгкий текстовый формат обмена данными. XML — расширяемый язык разметки, более многословный. JSON проще для чтения и парсинга, широко используется в мобильных приложениях. XML чаще встречается в SOAP и корпоративных системах."],
      ["Что такое WebSocket? Чем отличается от HTTP?", "HTTP — однонаправленный протокол: клиент делает запрос → сервер отвечает. WebSocket — двунаправленный постоянный канал связи: и клиент, и сервер могут посылать сообщения в любой момент. WebSocket используется в чатах, онлайн-играх, биржевых тикерах."],
      ["Что такое Long Polling и AJAX?", "AJAX — технология асинхронных запросов к серверу без перезагрузки страницы. Long Polling — клиент отправляет запрос, сервер держит соединение открытым до появления новых данных, потом отвечает и клиент сразу делает новый запрос. Имитирует push-уведомления через HTTP."],
      ["Монолит vs микросервисы — в чём разница?", "Монолит — единый модуль, где вся логика в одном месте, проще на старте, но сложно масштабировать. Микросервисы — набор маленьких независимых сервисов, каждый делает одно дело, легче масштабировать и тестировать, но сложнее в управлении. На начальных этапах проекта монолит проще и дешевле."],
      ["SQL vs NoSQL — в чём разница?", "SQL (реляционные БД: PostgreSQL, MySQL) — данные в таблицах со строгой схемой, поддерживает ACID-транзакции, подходит для структурированных данных. NoSQL (MongoDB, Redis, Cassandra) — гибкая схема, горизонтальное масштабирование, подходит для неструктурированных или быстро меняющихся данных."],
      ["Что такое Docker и зачем он нужен?", "Docker — инструмент контейнеризации: упаковывает приложение со всеми зависимостями в изолированный контейнер. Контейнер работает одинаково на любой машине. Это решает проблему «у меня работает, у тебя нет». Docker облегчает деплой и масштабирование."],
      ["Что такое Kubernetes?", "Kubernetes (K8s) — система оркестрации контейнеров: автоматически управляет запуском, масштабированием и восстановлением Docker-контейнеров. Если один контейнер упал — Kubernetes автоматически поднимет новый. Используется для управления большим числом микросервисов в продакшене."],
      ["Что такое CI/CD?", "CI (Continuous Integration) — автоматическое слияние и тестирование кода после каждого коммита. CD (Continuous Delivery/Deployment) — автоматическая доставка и деплой проверенного кода в продакшен. CI/CD ускоряет выпуск фич и снижает риск ошибок при релизах."],
      ["Blue-Green vs Canary deployment — в чём разница?", "Blue-Green: две одинаковые среды (blue — текущая, green — новая). Трафик переключается целиком с blue на green. При проблеме — мгновенный откат. Canary: новая версия сначала получает малый % трафика (5-10%), постепенно увеличивается. Позволяет тестировать на реальных пользователях с минимальным риском."],
      ["Что такое Git? Зачем он нужен?", "Git — система управления версиями кода. Позволяет нескольким разработчикам работать над одним проектом, не затирая чужие изменения. Хранит историю всех изменений. Ключевые операции: commit (сохранить изменения), push (отправить на сервер), pull (получить обновления), merge (слить ветки)."],
      ["Что такое merge, push и pull в Git?", "Merge — слияние кода из одной ветки в другую. Push — отправить код из локальной ветки в удалённый репозиторий. Pull — получить последние изменения из удалённого репозитория и слить с локальной веткой. Обратный процесс к push."],
      ["Что такое тонкий клиент и толстый клиент?", "Тонкий клиент — минимальная логика на устройстве пользователя, основная обработка на сервере. Пример: веб-приложения в браузере. Толстый клиент — значительная часть логики на устройстве. Пример: Microsoft Outlook, Office 365. Разница в том, где обрабатываются данные."],
      ["Что такое DNS?", "DNS (Domain Name System) — система, переводящая доменные имена (example.com) в IP-адреса серверов. Браузер не знает IP сайта, поэтому спрашивает DNS-сервер. Без DNS пришлось бы помнить числовые IP-адреса вместо удобных имён сайтов."],
      ["Что происходит, когда пользователь вводит URL в браузер?", "1) Браузер ищет IP в кэше (история, ОС, роутер). 2) Если нет — запрос к DNS-серверу. 3) Получив IP — устанавливает TCP-соединение с сервером. 4) Отправляет HTTP-запрос. 5) Сервер обрабатывает запрос и отправляет ответ. 6) Браузер рендерит HTML, делает GET-запросы за CSS/JS/картинками. 7) Страница отображается пользователю."],
      ["Что такое репликация базы данных?", "Репликация — создание и поддержание копий базы данных на нескольких серверах. Нужна для: надёжности (если один сервер упал — данные не потеряны), производительности (запросы на чтение распределяются по репликам), географического распределения (ближайший сервер — быстрее)."],
      ["Что такое натив vs кросс-платформенная разработка?", "Натив — приложение написано на языке конкретной платформы (Swift для iOS, Kotlin для Android). Лучшая производительность и доступ ко всем API устройства. Кросс-платформа (React Native, Flutter) — одна кодовая база для нескольких платформ. Дешевле в разработке, но могут быть ограничения. Для стартапа — кросс-платформа выгоднее, для высоконагруженных приложений — натив."],
    ]
  },
  {
    id: 11, color: "c2",
    name: "Управление проектами (PMBoK, Scrum, Agile)",
    cards: [
      ["Назови 5 этапов проекта по PMBoK.", "1) Инициация — определение целей и стейкхолдеров, устав проекта. 2) Планирование — WBS, расписание, бюджет, риски. 3) Исполнение — выполнение работ командой. 4) Мониторинг и контроль — отслеживание отклонений, управление изменениями. 5) Завершение — сдача результатов, ретроспектива, закрытие контрактов."],
      ["Что такое PMBoK?", "PMBoK (Project Management Body of Knowledge) — свод знаний по управлению проектами от PMI. Описывает 10 областей знаний (интеграция, содержание, расписание, стоимость, качество, ресурсы, коммуникации, риски, закупки, стейкхолдеры) и 49 процессов. Базовый стандарт для экзамена PMP."],
      ["Назови 3 роли в Scrum.", "1) Product Owner — отвечает за бэклог и приоритизацию задач, голос бизнеса. 2) Scrum Master — фасилитатор, защищает команду от помех, помогает соблюдать Scrum-процессы. 3) Development Team — самоорганизующаяся команда разработчиков, дизайнеров, QA, реализующая задачи."],
      ["Назови 3 артефакта Scrum.", "1) Product Backlog — приоритизированный список всех задач продукта (ведёт PO). 2) Sprint Backlog — подмножество бэклога, выбранное в спринт. 3) Increment — рабочая версия продукта, готовая после каждого спринта (Definition of Done)."],
      ["Назови 5 событий Scrum.", "1) Sprint — итерация 1-4 недели. 2) Sprint Planning — выбор задач в спринт. 3) Daily Scrum — ежедневный 15-минутный стендап. 4) Sprint Review — демо результатов стейкхолдерам. 5) Sprint Retrospective — обсуждение улучшений процесса внутри команды."],
      ["В чём суть Agile-манифеста? Назови 4 ценности.", "1) Люди и взаимодействие важнее процессов и инструментов. 2) Работающий продукт важнее исчерпывающей документации. 3) Сотрудничество с заказчиком важнее согласования условий контракта. 4) Готовность к изменениям важнее следования плану. Agile — про гибкость и итерационную поставку ценности."],
      ["Чем Waterfall отличается от Agile?", "Waterfall (каскадная модель) — последовательные фазы (анализ → дизайн → разработка → тестирование → внедрение), каждая завершается до начала следующей. Подходит для стабильных требований. Agile — итерационный подход, короткие циклы, частая обратная связь, гибкость к изменениям. Waterfall — для строительства, Agile — для разработки ПО с неопределёнными требованиями."],
      ["Что такое Fix Price vs Time & Materials?", "Fix Price — проект за фиксированный бюджет, объём работ чётко определён. Хорошо работает, когда требования понятны. Time & Materials — заказчик платит за фактически потраченное время и ресурсы. Применяется при неопределённости объёма или гибких требованиях. T&M часто используется в Scrum-проектах."],
      ["Что такое WSJF?", "WSJF (Weighted Shortest Job First) — метод приоритизации задач в SAFe. Формула: WSJF = Cost of Delay / Job Size. Cost of Delay складывается из: бизнес-ценности + срочности временного окна + снижения рисков. Задачи с наибольшим WSJF выполняются первыми — максимизируем экономическую выгоду."],
      ["Что такое EVM? Расшифруй PV, EV, AC, CV, SV, CPI, SPI.", "EVM (Earned Value Management) — система контроля проекта. PV (Planned Value) — запланированный объём работ. EV (Earned Value) — фактически выполненный объём. AC (Actual Cost) — фактические затраты. CV = EV - AC (отклонение по стоимости). SV = EV - PV (отклонение по срокам). CPI = EV/AC (индекс выполнения бюджета). SPI = EV/PV (индекс выполнения расписания)."],
      ["Как интерпретировать CPI и SPI?", "CPI > 1 — работаем экономнее плана (хорошо). CPI < 1 — перерасход (плохо). CPI = 1 — точно по плану. SPI > 1 — опережаем расписание. SPI < 1 — отстаём. SPI = 1 — точно по плану. Пример: CPI = 0.8 означает, что за каждый потраченный рубль получаем только 80 копеек ценности."],
      ["Что такое метрики HEART от Google?", "HEART — фреймворк измерения UX-качества продукта: H — Happiness (удовлетворённость: NPS, CSAT). E — Engagement (вовлечённость: частота использования). A — Adoption (принятие: новые пользователи, конверсия). R — Retention (удержание: % вернувшихся). T — Task Success (успешность выполнения задач: время, конверсия)."],
      ["Что такое Impact Mapping?", "Impact Mapping — стратегический инструмент планирования. Строится как карта: Цель → Актёры (кто влияет на цель) → Воздействия (как актёры меняют поведение) → Deliverables (что создаём, чтобы вызвать воздействие). Помогает не делать фичи ради фич, а всегда привязывать их к бизнес-цели."],
      ["Что такое юзер стори (User Story)?", "Юзер стори — короткое описание фичи с точки зрения конечного пользователя в формате: «Как [роль], я хочу [действие], чтобы [ценность]». Пример: «Как пользователь, я хочу ввести город в строку поиска, чтобы найти ближайший офис». Объясняет зачем делается фича, а не как."],
      ["Что такое критерии приёмки?", "Acceptance Criteria — условия, при которых юзер стори считается выполненной. Они должны быть конкретными, тестируемыми. Пример для поиска: «На странице есть строка и кнопка поиска. При вводе города и нажатии кнопки — на карте появляется точка». Без критериев приёмки фича может заработать, но не выполнить сценарий пользователя."],
      ["Что такое стили лидерства по DISC?", "DISC — модель поведения: D (Dominance) — напористый, ориентирован на результат. I (Influence) — общительный, убеждает и вдохновляет. S (Steadiness) — стабильный, поддерживающий, командный игрок. C (Conscientiousness) — точный, аналитический, следует правилам. Понимание стиля помогает PM выстраивать коммуникацию с каждым членом команды."],
      ["Что такое количественные и качественные метрики релиза?", "Количественные: скорость команды (velocity), количество дефектов за итерацию, число дефектов в продакшене. Качественные: отношение выполненных историй к плановым, отклонение от плановой даты релиза, технический долг. Проектные: отклонение от бюджета, плановый vs фактический срок, причины сдвигов."],
      ["Что такое Kanban и как он отличается от Scrum?", "Kanban — метод управления потоком работ. Нет спринтов, нет фиксированных ролей, задачи поступают и выполняются непрерывно. Ключевые принципы: визуализация (доска), WIP-лимиты, улучшение потока. Метрика — Cycle Time. Scrum — итерационный, с ролями, ретро, планированием. Kanban лучше для операционной работы, Scrum — для продуктовой."],
      ["Что такое ретроспектива в Scrum?", "Retrospective — встреча команды после каждого спринта для рефлексии о процессе (не продукте). Три вопроса: Что шло хорошо? Что шло плохо? Что улучшим в следующем спринте? Результат — список конкретных action items. Ретро помогает команде постоянно улучшать процессы работы."],
      ["Что такое Definition of Done (DoD)?", "DoD — соглашение команды о критериях «готовности» задачи. Пример: код написан + покрыт тестами + прошёл code review + задеплоен на стейджинг + проверен QA. Без DoD у каждого своё понимание «сделано», что приводит к скрытому техдолгу и дефектам в продакшене."],
    ]
  },
  {
    id: 12, color: "c3",
    name: "Технические вопросы на интервью PM",
    cards: [
      ["Назови этапы жизненного цикла ПО.", "Формирование требований → Проектирование → Реализация (разработка) → Тестирование → Внедрение → Эксплуатация и сопровождение → Снятие с эксплуатации. Первый этап отвечает на «Что будем делать?», проектирование — «Как будем делать?»."],
      ["Чем формирование требований отличается от проектирования?", "Формирование требований — PM и аналитики выясняют у заказчика, что нужно автоматизировать и какой результат получить. Проектирование — собирается команда разработчиков и определяет, как именно реализовать требования (архитектура, технологии, схемы)."],
      ["Что такое техническая поддержка (support) продукта?", "Техподдержка — не ответы на звонки клиентов, а решение проблем при нарушении работы продукта. Если что-то «ломается», команда разработки должна оперативно исправить это. Если есть инженер сопровождения — он отвечает за техподдержку. Если нет — QA, разработчики и PM."],
      ["Что такое бизнес-аналитик? Чем отличается от системного аналитика?", "Бизнес-аналитик — разбирается в бизнес-процессах компании, которые нужно автоматизировать. Изучает требования, цели и задачи заказчика. Системный аналитик — переводит «что нужно сделать» в «как это сделать»: составляет схемы, диаграммы, работает с техкомандой и архитектурой."],
      ["Что такое User Story и Use Cases? В чём разница?", "User Story — история клиента от начала до конца (например, вход в интернет-магазин → регистрация → покупка). Use Cases — детальное рассмотрение одного конкретного шага User Story. Например, «клиент оставил заявку» — это один Use Case внутри большой User Story покупки."],
      ["Функциональные vs нефункциональные требования — в чём разница?", "Функциональные — описывают что система должна делать: «пользователь может войти по логину и паролю». Нефункциональные — как система должна это делать: время отклика (< 200 мс), доступность (99.9%), поддерживаемые устройства, безопасность. NFR определяют качество, а не функции."],
      ["Что такое ТЗ (техническое задание)?", "ТЗ — основной документ разработки. Описывает что нужно сделать, как это сделать, функциональные и нефункциональные требования. Защищает и разработчиков, и клиента: все соблюдают требования ТЗ. Без ТЗ — результат непредсказуем. ТЗ фиксируется и является основой для всей команды."],
      ["Где хранить и управлять требованиями?", "Зависит от отношений с заказчиком. Confluence — удобнее хранить у себя (менеджер может писать информацию, которую не хотел бы показывать заказчику). Jira — для связки с задачами. Notion — гибкий вариант. Важно: документация должна быть актуальной и доступной всей команде."],
