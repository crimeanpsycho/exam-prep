    <div class="stat-chip"><strong style="color:var(--yellow)">${unsure}</strong> <span>не уверен</span></div>
    <div class="stat-chip"><strong style="color:var(--red)">${dontknow}</strong> <span>не знаю</span></div>
    <div class="stat-chip"><strong>${total}</strong> <span>всего</span></div>
  `;
}

function renderCard() {
  const completed = document.getElementById('completed-screen');
  const cardArea = document.getElementById('card-area');
  const navRow = document.getElementById('nav-row');
  const ratingRow = document.getElementById('rating-row');

  if (currentIndex >= currentDeck.length) {
    completed.classList.add('visible');
    cardArea.style.display = 'none';
    navRow.style.display = 'none';
    ratingRow.style.display = 'none';
    renderCompleted();
    return;
  }

  completed.classList.remove('visible');
  cardArea.style.display = 'block';
  navRow.style.display = 'flex';
  ratingRow.style.display = 'flex';

  const card = currentDeck[currentIndex];

  // Reset flip
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');

  document.getElementById('card-counter').textContent = `${card.sectionName}`;
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-answer').textContent = card.a;

  // Progress
  const pct = currentDeck.length > 1 ? (currentIndex / (currentDeck.length - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${currentIndex + 1} из ${currentDeck.length}`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex >= currentDeck.length - 1;

  // Rating buttons visibility
  const ratingBtns = document.querySelectorAll('.rating-btn');
  ratingBtns.forEach(b => b.classList.remove('hidden'));

  renderStatsBar();
  renderSidebar();
}

function renderCompleted() {
  const know = getTotalKnow();
  const unsure = getTotalUnsure();
  const dk = getTotalDontKnow();
  const total = currentDeck.length;

  document.getElementById('completed-sub').textContent = `Вы прошли ${total} карточек из блока «${activeSectionId === 0 ? 'Все темы' : SECTIONS.find(s=>s.id===activeSectionId)?.name}»`;

  document.getElementById('completed-stats').innerHTML = `
    <div class="completed-stat green"><div class="val">${know}</div><div class="lbl">Знаю</div></div>
    <div class="completed-stat yellow"><div class="val">${unsure}</div><div class="lbl">Не уверен</div></div>
    <div class="completed-stat red"><div class="val">${dk}</div><div class="lbl">Не знаю</div></div>
  `;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (currentIndex < currentDeck.length - 1) {
    currentIndex++;
    renderCard();
  } else if (currentIndex === currentDeck.length - 1) {
    currentIndex++;
    renderCard();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function rateCard(rating) {
  const card = currentDeck[currentIndex];
  ratings[card.id] = rating;
  nextCard();
}

function selectSection(id) {
  activeSectionId = id;
  currentDeck = buildDeck(id);
  currentIndex = 0;
  renderCard();
}

function shuffleDeck() {
  currentDeck = shuffle(currentDeck);
  currentIndex = 0;
  renderCard();
}

function resetDeck() {
  Object.keys(ratings).forEach(k => delete ratings[k]);
  currentDeck = buildDeck(activeSectionId);
  currentIndex = 0;
  renderCard();
}

function repeatWrong() {
  const wrong = buildDeck(activeSectionId, true);
  if (wrong.length === 0) {
    alert('Нет карточек для повторения — вы отметили всё как «Знаю»! 🎉');
    return;
  }
  currentDeck = shuffle(wrong);
  currentIndex = 0;
  renderCard();
}

// Init
document.getElementById('card-inner').addEventListener('click', flipCard);
document.getElementById('btn-prev').addEventListener('click', prevCard);
document.getElementById('btn-next').addEventListener('click', nextCard);
document.getElementById('btn-shuffle').addEventListener('click', shuffleDeck);
document.getElementById('btn-reset').addEventListener('click', resetDeck);
document.getElementById('btn-repeat-wrong').addEventListener('click', repeatWrong);
document.getElementById('btn-repeat-wrong2').addEventListener('click', repeatWrong);
document.getElementById('btn-restart').addEventListener('click', () => {
  currentDeck = buildDeck(activeSectionId);
  currentIndex = 0;
  renderCard();
});
document.getElementById('btn-know').addEventListener('click', () => rateCard('know'));
document.getElementById('btn-unsure').addEventListener('click', () => rateCard('unsure'));
document.getElementById('btn-dontknow').addEventListener('click', () => rateCard('dontknow'));

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === '1') rateCard('know');
  if (e.key === '2') rateCard('unsure');
  if (e.key === '3') rateCard('dontknow');
});

// Start
currentDeck = buildDeck(0);
renderCard();
renderSidebar();
</script>
</body>
</html>
