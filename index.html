      ["Что такое Use Cases и Test Cases?", "Use Cases — описывает сценарий взаимодействия участников с системой, может быть в виде диаграмм или текста. Нужен разработчикам, QA и PM для понимания требований. Test Cases — инструкция для тестировщика: чётко описывает шаги проверки каждой функции так, чтобы любой тестировщик мог воспроизвести."],
      ["Какой Task Tracker выбрать?", "Нет универсального ответа — нужно смотреть на возможности и подбирать под проект. Jira — наиболее распространена (упоминается в 33% вакансий PM). Trello — проще, для небольших команд. Asana, Monday, Linear — альтернативы. Важно: инструмент под команду, а не команда под инструмент."],
      ["Для чего нужен Project Planning / диаграмма Ганта?", "Диаграмма Ганта — базовый инструмент PM для визуализации этапов проекта на временной шкале. Позволяет: отслеживать прогресс от начала до конца, видеть параллельные и зависимые задачи, контролировать сроки и остаток времени и бюджета. Project Planning инструменты: MS Project, GanttPRO, Jira Roadmap."],
      ["Какие типы тестирования существуют?", "Функциональное — тестируем конкретную функцию. Smoke-тестирование — быстрая проверка при мелком баге, не влияющем на функциональность. Регрессионное — полная проверка всего кода, обычно перед релизом. Нагрузочное — тест при высокой нагрузке (20 000 одновременных пользователей). Интеграционное — проверка взаимодействия клиента и сервера."],
      ["Что такое приоритеты багов?", "Каждому багу присваивается статус: Критический — продукт не работает, нельзя продолжать тестирование. Высокий — серьёзная проблема, но функциональность частично доступна. Средний — дефект есть, но не критичен. Низкий — косметический дефект. Блокер — невозможно продолжить тесты, пока не исправлен."],
      ["Что такое фреймворк vs библиотека?", "Фреймворк — структура кода, задаёт архитектуру приложения, разработчик работает внутри него. Библиотека — готовое решение для конкретной задачи, встраивается в приложение. Фреймворк сложнее изменить, библиотеку — тяжело кастомизировать. Пример: React (библиотека), Angular (фреймворк)."],
      ["Что такое MVC?", "MVC (Model-View-Controller) — архитектурный паттерн. Model — данные и бизнес-логика. View — отображение (что видит пользователь). Controller — обрабатывает запросы и связывает Model и View. Разделение упрощает тестирование и поддержку кода. Используется в Django, Rails, Laravel."],
      ["Что такое SPA, MPA, PWA?", "SPA (Single Page Application) — одностраничное приложение, страница не перезагружается, контент меняется динамически (React, Vue). MPA (Multi Page Application) — классический сайт, каждая страница загружается с сервера. PWA (Progressive Web App) — веб-приложение с возможностями нативного: работает офлайн, добавляется на главный экран."],
      ["Что такое Postman и Swagger?", "Postman — инструмент для тестирования API: можно отправлять запросы (GET/POST/PUT/DELETE) и проверять ответы сервера без написания кода. Удобен PM и QA. Swagger — инструмент документирования API: описывает эндпоинты, параметры запросов и форматы ответов. Является стандартом OpenAPI."],
      ["Что такое СMS?", "CMS (Content Management System) — система управления контентом сайта. Позволяет редактировать сайт без знания HTML и программирования. Примеры: WordPress, 1С-Битрикс, Joomla, Drupal, Tilda. CMS предоставляет визуальный редактор для изменения содержимого базы данных."],
      ["Что такое SEO?", "SEO (Search Engine Optimization) — комплекс работ по увеличению видимости сайта в поисковых системах. Включает техническую оптимизацию (скорость, структура), работу с контентом (ключевые слова), внешние ссылки. Цель — попасть в топ-10 результатов поиска по целевым запросам."],
    ]
  },
  {
    id: 13, color: "c4",
    name: "Блокчейн, документация и карьера PM",
    cards: [
      ["Что такое блокчейн?", "Блокчейн — распределённая база данных, хранящая информацию обо всех транзакциях участников системы. Данные записываются в блоки, каждый из которых связан с предыдущим. Децентрализован — нет единого сервера, данные хранятся у всех участников сети."],
      ["Что такое FinTech?", "FinTech — предоставление финансовых услуг с использованием инновационных технологий: Big Data, искусственный интеллект, машинное обучение, роботизация, блокчейн, облачные технологии, биометрия."],
      ["Что такое KYC и AML?", "KYC (Know Your Customer) — идентификация личности клиента финансовыми институтами перед проведением операции. AML (Anti-Money Laundering) — противодействие отмыванию денег. Обе процедуры обязательны для банков, бирж и финансовых платформ."],
      ["Что такое смарт-контракт?", "Смарт-контракт — программный код на блокчейне, который автоматически исполняется при выполнении заранее прописанных условий. Без посредников. Пример: деньги переводятся автоматически, когда груз доставлен по GPS-данным. Solidity — язык для написания смарт-контрактов."],
      ["Что такое стейкинг и майнинг?", "Майнинг — нахождение новых блоков в блокчейне с помощью вычислительной мощности (Proof of Work). Стейкинг — пассивный заработок: хранение монет на кошельке для поддержания сети (Proof of Stake). Стейкинг не требует мощного железа, в отличие от майнинга."],
      ["Что такое DeFi?", "DeFi (Decentralized Finance) — финансовые инструменты в виде сервисов и приложений на блокчейне. Цель — стать альтернативой банковскому сектору и заменить традиционные финансовые технологии протоколами с открытым исходным кодом."],
      ["Какая документация нужна PM в IT-проекте?", "Устав проекта, WBS/ИСР, SRS/SOW (ТЗ, спецификация требований), Project Scope / Roadmap, Stakeholder Map, Risk Register, Журнал изменений (Change Requests), Meeting Notes (Kickoff, Planning, Standup, Retro), Daily Plan / Dev Plan, Gantt Chart, Action Plan, SLA."],
      ["Что такое SLA?", "SLA (Service Level Agreement) — соглашение об уровне сервиса между поставщиком и клиентом. Описывает: доступность системы (uptime 99.9%), время реакции на инциденты, штрафы за нарушения. Защищает обе стороны и фиксирует ожидания от качества услуг."],
      ["Что такое Stakeholder Map?", "Stakeholder Map (реестр заинтересованных сторон) — документ, описывающий всех участников проекта: кто они, какое влияние имеют, каков их интерес к проекту. Матрица влияния помогает PM выстраивать правильную коммуникацию с каждым стейкхолдером."],
      ["Чем Junior PM отличается от Middle и Senior PM?", "Junior PM: базовое понимание ролей, контроль сроков/бюджета, общение с клиентом, ведение проекта под руководством. Middle PM: мотивация команды, переговоры, управление рисками, ведение нескольких проектов, лидерство. Senior PM: Delivery Management, менторинг ПМов, создание ПМ-офиса, сертификации, стратегическое управление."],
      ["Что такое карьерные линии для IT PM?", "1) PM → Program Manager → Portfolio Manager → Head of PMO. 2) PM → Delivery Manager → Delivery Director. 3) PM → Product Manager → Product Owner → Chief Product Officer. 4) Операционные руководители: COO/CIO/CTO/CEO. 5) BDM (Business Development Manager)."],
      ["Что такое RFA и Handover-документ?", "RFA (Request for Application) — документ при передаче проекта другому PM: о чём проект, сроки, команда, клиент, пожелания к руководителю. Handover — файл передачи дел с полной информацией: наименование проекта, статус, задачи, контакты, сроки, замечания."],
      ["Как подготовиться к техническому интервью PM?", "12 ключевых тем: жизненный цикл ПО, методологии, бизнес-аналитика, техническая документация, инструментарий проекта, архитектура, клиент-сервер, REST, фреймворки и библиотеки, Git, натив/кросс-платформа, тестирование. Нужно понимать каждую тему на уровне нетехнического объяснения."],
      ["Что такое чек-лист кандидата перед интервью PM?", "1) Полные и детальные ответы. 2) Готовность к уточняющим вопросам. 3) Подкреплять примеры конкретикой и цифрами. 4) Показать, как решаешь боли работодателя. 5) Говорить на языке результатов: «сделал», «улучшил», «создал». 6) Подготовить описание самого сложного проекта и своего провала. 7) Точные, структурные ответы на конкретный вопрос."],
      ["Что такое Agile, Kanban, XP, LEAN?", "Agile — семейство гибких методологий, ценности в манифесте Agile. Kanban — управление потоком задач с WIP-лимитами. XP (Extreme Programming) — акцент на техническое качество: TDD, парное программирование, непрерывная интеграция. LEAN — минимизация потерь, только то, что создаёт ценность для клиента."],
      ["Назови инструменты PM по категориям.", "Task-трекеры: Jira, Asana, Trello, Redmine, Mantis. Коммуникация: Slack, Mattermost. Схемы: MindManager, XMind, Miro, FlowMapp, Canva. Документация: Notion, GoogleDocs, Confluence, Slite. Git: BitBucket, GitLab, GitHub. Дизайн: Figma, Tilda."],
    ]
  },
  {
    id: 14, color: "c5",
    name: "Как работать в Jira",
    cards: [
      ["Что такое Jira и для чего она используется?", "Jira — система управления задачами и проектами от Atlassian. Используется для: планирования спринтов, ведения бэклога, трекинга задач разработки, баг-трекинга, Kanban-досок. Единица работы — тикет (issue) с типом, статусом, исполнителем, приоритетом."],
      ["Какие типы задач (issue types) есть в Jira?", "Epic — большая инициатива (несколько спринтов). Story (User Story) — функция с точки зрения пользователя. Task — техническая задача без пользовательского контекста. Bug — дефект. Subtask — подзадача любого тикета. В Jira Service Management добавляется тип Request (обращение пользователя)."],
      ["Как создать задачу в Jira? Что обязательно нужно заполнить?", "Нажать кнопку «Create» (или C на клавиатуре). Обязательно: проект, тип задачи (Issue Type), краткое название (Summary). Рекомендуется: описание, Assignee, Priority, Sprint, Story Points, Labels, Epic Link."],
      ["Что такое спринт в Jira и как он организуется?", "Спринт — итерационный цикл работы (1-4 недели). Организация: Sprint Planning — берём задачи из бэклога → Daily Standup → Sprint Review (демо) → Retrospective. Незавершённые задачи переходят в следующий спринт. Спринты создаются в разделе Backlog проекта."],
      ["Что такое бэклог в Jira и как с ним работать?", "Бэклог — приоритизированный список всех задач проекта, не взятых в спринт. PO расставляет задачи по приоритету (сверху — самые важные). Команда уточняет и оценивает задачи на Refinement. Задачи берутся в спринт из верхней части бэклога на Sprint Planning."],
      ["Что такое Kanban board в Jira? Чем отличается от Scrum board?", "Kanban board — доска с колонками по статусам (To Do → In Progress → Done), без спринтов, с непрерывным потоком задач. Scrum board — доска для задач текущего спринта, сбрасывается после каждого спринта. Kanban — для операционной работы, Scrum — для продуктовой разработки итерациями."],
      ["Что такое workflow в Jira?", "Workflow — набор статусов и переходов между ними, отражающий жизненный цикл задачи. Стандартный: Open → In Progress → In Review → Done. Переходы можно настраивать: добавлять условия, триггеры, валидации. Например: задача не может перейти в Done без заполненного поля Resolution."],
      ["Что такое JQL (Jira Query Language)?", "JQL — язык запросов для фильтрации задач в Jira. Примеры: project = MYAPP AND status = 'In Progress' — все задачи в работе. assignee = currentUser() AND sprint in openSprints() — мои задачи в текущем спринте. JQL используется в фильтрах и дашбордах."],
      ["Что такое фильтры в Jira и как их создать?", "Фильтр — сохранённый JQL-запрос. Создаётся в разделе Filters → Create Filter. Можно поделиться с командой или проектом. Используется для: дашбордов, быстрого доступа к нужным задачам, отчётов. Примеры готовых фильтров: «Мои открытые задачи», «Блокеры текущего спринта»."],
      ["Что такое Story Points и зачем они нужны?", "Story Points — относительная оценка сложности задачи командой (не в часах). Учитывают: сложность, объём, неопределённость. Шкала: числа Фибоначчи (1, 2, 3, 5, 8, 13, 21). Позволяют отслеживать Velocity (сколько SP команда выполняет за спринт) и строить прогнозы."],
      ["Что такое Epic Link и как связывать задачи?", "Epic Link — поле в задаче, которое связывает её с родительским эпиком. Связи между задачами (Links): blocks/is blocked by (блокирует), relates to (связана с), duplicates (дублирует), clones. Помогают видеть зависимости и влияние задач друг на друга."],
      ["Что такое компоненты и ярлыки (Labels) в Jira?", "Компоненты — части продукта или системы (Backend, Frontend, Auth, Payments). Назначаются задаче для группировки по функциональным областям. Labels — свободные теги для дополнительной классификации (hotfix, tech-debt, performance). Оба помогают фильтровать и находить задачи."],
      ["Что такое Velocity Chart в Jira?", "Velocity Chart — отчёт, показывающий количество Story Points, выполненных командой за каждый спринт. Помогает: оценить стабильность команды, прогнозировать объём следующего спринта, выявить спринты с аномалиями. Velocity = среднее SP за последние 3-5 спринтов."],
      ["Что такое Burndown Chart?", "Burndown Chart — график сгорания работы в спринте. Ось X — дни спринта, ось Y — оставшиеся Story Points. Идеальная линия — равномерный спуск к нулю. Реальная линия выше идеала — команда отстаёт. Ниже — опережает план. Помогает видеть проблемы в середине спринта, а не в конце."],
      ["Как настроить дашборд в Jira?", "Дашборды (Dashboards) — настраиваемые страницы с гаджетами (виджетами). Создаются через Dashboards → Create Dashboard. Полезные гаджеты: Sprint Health Gadget, Burndown, Velocity Chart, Assigned to Me, Issue Statistics. Можно шарить с командой. Дашборд — главная страница для ежедневного мониторинга."],
    ]
  },
  {
    id: 15, color: "c6",
    name: "Confluence Wiki",
    cards: [
      ["Что такое Confluence и чем отличается от Jira?", "Confluence — корпоративная wiki-система от Atlassian для хранения знаний: документация, регламенты, архитектурные решения, meeting notes, онбординг. В Jira — задачи. В Confluence — знания. Тесно интегрированы: тикет Jira можно вставить прямо в страницу Confluence."],
      ["Что такое Space в Confluence?", "Space (пространство) — верхний уровень организации контента. Как отдельный сайт внутри Confluence. Бывает: команда/проект (разработка, маркетинг), личное пространство (~username). У каждого Space свои настройки доступа, оформление, набор страниц. Структура: Space → Pages → Child Pages."],
      ["Как создать страницу в Confluence?", "В нужном Space нажать «Create» (или C на клавиатуре). Выбрать шаблон или чистую страницу. Указать заголовок и родительскую страницу (Parent Page) — это определяет место в иерархии. Контент добавляется через редактор (текст, таблицы, макросы, вложения, медиа)."],
      ["Как организовать иерархию страниц?", "Space → Section (раздел) → Page → Child Pages. Принципы хорошей структуры: по продукту/команде на уровне Space, по темам (архитектура, процессы, онбординг) на уровне разделов, конкретные документы — страницы. Иерархия настраивается перетаскиванием в Space Tree."],
      ["Что такое шаблоны (Templates) в Confluence?", "Шаблоны — предзаполненные структуры страниц для типовых документов. Встроенные: Meeting Notes, Decision, Retrospective, Requirements. Создать свой: Space Settings → Templates → Create Template. При создании страницы → выбрать шаблон. Сокращают время на оформление типовых документов."],
      ["Как работать с правами доступа на уровне Space?", "Space Permissions (Настройки Space → Permissions): можно задать права для групп и пользователей. Уровни: View (просмотр), Add/Edit Pages, Delete Pages, Admin. Лучшая практика: права через группы, не через конкретных пользователей. Space Admin — полные права в этом пространстве."],
      ["Как ограничить доступ к конкретной странице?", "На странице: «...» (More actions) → Restrictions. Можно запретить просмотр (View) или редактирование (Edit) всем, кроме указанных пользователей/групп. Ограничения страницы перекрывают права Space. Дочерние страницы наследуют ограничения родительской, если не указано иное."],
      ["Как работать с историей изменений страницы?", "Page History: «...» → Page History. Показывает все версии страницы с датой, автором и кратким описанием изменений. Можно: сравнить две версии (Compare), восстановить предыдущую версию (Restore). Это защищает от случайного удаления важного контента."],
      ["Как искать контент в Confluence?", "Глобальный поиск — иконка поиска (/) или Ctrl+K. Поиск по: заголовку страницы, содержимому, автору, Space, дате изменения, Labels. В Advanced Search — фильтры. Чтобы поиск работал хорошо — страницы должны иметь понятные заголовки и Labels."],
      ["Что такое Labels в Confluence и зачем они нужны?", "Labels — теги для страниц. Добавляются внизу страницы. Помогают: группировать страницы разных Space по теме, создавать динамические списки через макрос Content by Label. Примеры: 'onboarding', 'architecture', 'decision', 'meeting-notes'. Полезны для навигации по большим пространствам."],
      ["Как вставить контент из Jira в Confluence?", "Макрос Jira Issues: {jira} → вставляет список задач по JQL-запросу прямо в страницу. Обновляется автоматически. Также можно: вставить ссылку на тикет (он красиво отображается как карточка), вставить Jira Road Map. Это объединяет планирование (Confluence) и исполнение (Jira)."],
      ["Как работать с комментариями в Confluence?", "Страничные комментарии (Page Comments) — внизу страницы, видны всем, поддерживают @mention и форматирование. Inline Comments — выделить текст → иконка комментария. Привязаны к конкретному фрагменту. Разрешить/запретить комментарии: Space Settings → Comment Settings."],
      ["Как экспортировать страницу Confluence?", "«...» → Export. Форматы: PDF (сохраняет форматирование, подходит для отправки клиентам), Word (редактируемый документ), HTML. Space Export — экспорт всего пространства (доступен Space Admin). Важно: макросы и вставленные Jira-задачи в PDF могут отображаться некорректно."],
      ["Как использовать @mention и уведомления?", "@имя — упоминание пользователя в тексте или комментарии. Пользователь получит email/in-app уведомление. Watch Page — подписка на изменения страницы (кнопка «Watch»). Watch Space — уведомления обо всех изменениях в Space. Управление уведомлениями: Profile → Settings → Email."],
      ["Что такое Blueprint в Confluence?", "Blueprint — продвинутый шаблон с дополнительной логикой: автоматически создаёт дочерние страницы по заданной структуре, добавляет индекс. Встроенные: Product Requirements, Meeting Notes, DACI Decision. Создать свой: Space Settings → Blueprints. Отличается от шаблона тем, что может создавать несколько связанных страниц сразу."],
    ]
  },
  {
    id: 16, color: "c7",
    name: "Макросы в Confluence",
    cards: [
      ["Что такое макрос в Confluence?", "Макрос — встроенный компонент, добавляющий на страницу динамический контент или специальное форматирование. Вставляется через '/' или '+' в редакторе. Примеры: оглавление, предупреждающий блок, список дочерних страниц, Jira-задачи. Макросы делают страницы интерактивными и структурированными."],
      ["Как вставить макрос в Confluence?", "В редакторе страницы: ввести / (слэш) → начать печатать название макроса → выбрать из списка. Или: нажать + в тулбаре → View More → найти макрос по категории. После вставки — настроить параметры в диалоге. В старом редакторе: Insert → Other Macros."],
      ["Макрос Table of Contents — для чего и как настроить?", "Автоматически создаёт оглавление из заголовков страницы (H1-H6). Параметры: minLevel/maxLevel (глубина заголовков), style (flat или disc), indent. Вставлять в начале длинных страниц — документации, руководств. Обновляется автоматически при изменении заголовков."],
      ["Макросы Info, Note, Warning, Tip — в чём разница?", "Блоки выделения важного контента: Info (синий) — нейтральная информация. Note (жёлтый) — важное замечание. Warning (красный) — предупреждение об опасном действии. Tip (зелёный) — полезный совет. Синтаксис: {info}, {note}, {warning}, {tip}. Делают страницу читаемее и безопаснее."],
      ["Макрос Code Block — как использовать?", "Вставляет блок кода с подсветкой синтаксиса. Параметры: Language (java, python, sql, bash, json…), Theme (цветовая схема), linenumbers (показывать номера строк), firstline (с какой строки нумеровать). Незаменим для технической документации, инструкций, примеров запросов."],
      ["Макрос Expand — для чего нужен?", "Создаёт сворачиваемый блок с заголовком. Контент скрыт по умолчанию, раскрывается по клику. Применение: скрыть детали, не загромождая страницу (спойлер), FAQ (вопрос → ответ разворачивается), длинные примеры кода. Параметр: Title (текст заголовка кнопки раскрытия)."],
      ["Макрос Status — для чего нужен?", "Отображает цветной бейдж статуса прямо в тексте. Цвета: Grey (нейтральный), Blue (в работе), Green (готово), Yellow (внимание), Red (проблема). Применение: статус задачи/документа в тексте, трекинг статусов в таблице, пометка разделов документации. Параметры: Title (текст), Color."],
      ["Макрос Jira Issues — как использовать?", "Вставляет динамический список Jira-задач по JQL-запросу прямо на страницу Confluence. Параметры: Server (подключение к Jira), JQL-запрос, отображаемые колонки, максимальное число задач. Список обновляется автоматически. Применение: статус-страница проекта, страница релиза со списком задач."],
      ["Макрос Page Properties — что это и зачем?", "Создаёт структурированную таблицу метаданных страницы (key-value пары). В связке с макросом Page Properties Report собирает метаданные со многих страниц в одну сводную таблицу. Применение: реестр решений (ADR), список проектов с их статусами, каталог сервисов. Мощный инструмент для структурированных баз знаний."],
      ["Макрос Children Display — для чего?", "Отображает список дочерних страниц текущей (или указанной) страницы. Параметры: depth (глубина — сколько уровней показать), sort (сортировка), style (list или h-list). Применение: автоматически генерируемое меню раздела, навигационная страница-индекс. Обновляется при добавлении новых дочерних страниц."],
      ["Макрос Include Page — для чего?", "Вставляет содержимое другой страницы Confluence на текущую страницу. Изменение в исходной странице автоматически отражается везде, где она включена. Применение: единый глоссарий терминов, переиспользуемые блоки (контактная информация команды, стандартные предупреждения). Принцип DRY (Don't Repeat Yourself) для документации."],
      ["Макрос Recently Updated — для чего?", "Показывает список недавно обновлённых страниц по заданным фильтрам. Параметры: Space, Label, автор, тип контента, максимальное число страниц. Применение: виджет 'Последние изменения' на главной странице Space или команды, мониторинг активности в разделе документации."],
      ["Макрос Roadmap Planner — что это?", "Интерактивная диаграмма Ганта прямо на странице Confluence. Можно добавлять полосы (bars) с названием, датами начала/конца, цветом. Без интеграции с Jira — просто визуализация. Применение: высокоуровневый роадмап продукта, план релизов для стейкхолдеров, квартальный план команды."],
      ["Макрос Excerpt и Excerpt Include — в чём польза?", "Excerpt — помечает фрагмент страницы как «выдержку» (краткое описание). Excerpt Include — вставляет эту выдержку на другую страницу. В связке с Children Display с включённым excerpt — автоматически создаётся аннотированный список страниц. Применение: каталоги статей, автоматические анонсы документов."],
      ["Макрос User Profile / User List — для чего?", "User Profile — показывает карточку пользователя Confluence (аватар, имя, email, роль). User List — список пользователей группы или Space с их профилями. Применение: страница команды проекта, список ответственных в онбординге, RACI-матрица. Данные берутся из профилей Atlassian автоматически."],
    ]
  },
  {
    id: 17, color: "c8",
    name: "Аналитика и блокировки в Confluence",
    cards: [
      ["Как посмотреть статистику просмотров страницы в Confluence?", "На странице: иконка '...' → Page Insights (или Analytics). Показывает: количество просмотров за период (7/30/90 дней), уникальные читатели, динамику просмотров, список пользователей которые просматривали страницу. Доступно в Confluence Cloud; в Data Center — через плагин Analytics for Confluence."],
      ["Что такое Space Analytics в Confluence?", "Space Analytics — статистика на уровне всего пространства. Доступна через: Space Settings → Analytics (в Confluence Cloud). Показывает: наиболее просматриваемые страницы, активных читателей, активных авторов, тренды активности. Помогает понять, какой контент востребован, а какой устарел."],
      ["Какие метрики доступны в Confluence Analytics?", "Просмотры (Views) — общее число открытий страницы. Уникальные читатели (Unique Viewers) — число разных пользователей. Реакции (Likes/Emoji) — вовлечённость. Комментарии — обратная связь. Редакторы (Contributors) — кто вносил правки. Время последнего просмотра. Все метрики доступны в разбивке по периодам."],
      ["Как отслеживать, кто просматривал конкретную страницу?", "Page Insights (в Cloud): список пользователей с датой их последнего просмотра. В Data Center: плагины типа Analytics for Confluence (третья сторона). Важно: в ряде конфигураций просмотры анонимных пользователей не отслеживаются. Для чувствительного контента — дополнительно ограничить просмотр через Page Restrictions."],
      ["Как выявить устаревший контент с помощью аналитики?", "Признаки устаревшего контента: нет просмотров за 90+ дней, последнее редактирование 6+ месяцев назад, нет реакций и комментариев. В Space Analytics — сортировать страницы по дате последнего обновления. Регулярный Page Audit (ежеквартально): архивировать ненужное, обновлять актуальное."],
      ["Как экспортировать аналитические данные Confluence?", "В Confluence Cloud Analytics: экспорт данных в CSV через кнопку Export. Для кастомной аналитики — Confluence REST API: GET /wiki/rest/api/content/{id}/history возвращает историю изменений. Плагины (Analytics for Confluence, Comala) предоставляют расширенный экспорт и дашборды."],
      ["Что такое Page Restrictions в Confluence?", "Page Restrictions — ограничения доступа на уровне конкретной страницы. Два типа: View Restriction (только указанные пользователи/группы могут видеть страницу) и Edit Restriction (только указанные могут редактировать). Перекрывают Space Permissions — даже если у пользователя есть доступ к Space, он не увидит страницу с View Restriction."],
      ["Как наследуются ограничения доступа в Confluence?", "По умолчанию дочерние страницы НЕ наследуют ограничения родительской. Каждая страница имеет свои настройки. Если нужно, чтобы ограничения распространялись на все дочерние страницы — нужно настраивать каждую вручную или использовать Space Permissions (действует на весь Space). Плагины (Scroll Permissions) помогают автоматизировать наследование."],
      ["Как ограничить просмотр страницы только для своей команды?", "На странице: '...' → Restrictions → Add Restriction. Выбрать Viewing. Добавить группу (group:developers) или конкретного пользователя. Убедиться, что пункт 'Only the following can view this page' активен. Сохранить. Пользователи не в списке увидят сообщение об отсутствии доступа."],
      ["Чем View Restriction отличается от Edit Restriction?", "View Restriction — полностью скрывает страницу от тех, кто не в списке. Edit Restriction — страница видна всем с доступом к Space, но редактировать могут только указанные пользователи. View автоматически включает Edit ограничение. Рекомендация: для черновиков — Edit Restriction, для конфиденциального — View Restriction."],
      ["Что такое Space Permissions и как они соотносятся с Page Restrictions?", "Space Permissions — настройки доступа для всего Space (кто может просматривать, редактировать, удалять страницы). Базовый уровень. Page Restrictions — дополнительные ограничения на конкретные страницы. Логика: Space Permissions даёт право быть в Space, Page Restrictions — право читать/редактировать конкретную страницу."],
      ["Как просмотреть все ограничения, установленные на страницу?", "На странице: иконка замка (🔒) рядом с заголовком (если есть ограничения) → показывает текущие правила. Или: '...' → Restrictions → открывает диалог со всеми текущими View и Edit ограничениями. Также: Space Settings → Content Reports → Restricted Pages (список всех ограниченных страниц в Space)."],
      ["Как снять ограничение просмотра со страницы?", "На странице: '...' → Restrictions → найти нужное ограничение → удалить (иконка корзины) или переключить с 'Only following can view' на 'All users'. Важно: только Space Admin или пользователь с правом редактирования может снять ограничения. Если у вас нет доступа — обратитесь к Space Admin."],
      ["Что такое анонимный доступ и как его настроить?", "Анонимный доступ — возможность просматривать контент без авторизации (публично). Настраивается на уровне Space: Space Settings → Permissions → Anonymous. Можно разрешить: View (только чтение) или Add Comments. Для полностью закрытых корпоративных Space — анонимный доступ всегда отключён."],
      ["Как управлять правами доступа через Confluence REST API?", "GET /wiki/rest/api/content/{id}/restriction — получить ограничения страницы. PUT /wiki/rest/api/content/{id}/restriction — установить ограничения. DELETE — снять. Используется для: автоматизации прав при создании страниц, интеграции с HR-системами (при увольнении сотрудника — автоматически отозвать доступ). Требует прав Space Admin."],
    ]
  },
  {
    id: 18, color: "c9",
    name: "Жизненный цикл ПО (SDLC)",
    cards: [
      ["Что такое SDLC?", "SDLC (Software Development Life Cycle) — жизненный цикл разработки программного обеспечения. Структурированный процесс создания ПО от идеи до вывода из эксплуатации. Определяет: что делать на каждом этапе, кто участвует, какие документы создаются, каковы критерии перехода к следующему этапу."],
      ["Назови все этапы SDLC по порядку.", "1) Планирование/Инициация. 2) Анализ требований. 3) Проектирование (Design). 4) Разработка (Implementation). 5) Тестирование (Testing). 6) Внедрение (Deployment). 7) Эксплуатация и поддержка (Maintenance). 8) Снятие с эксплуатации (Retirement). Первые два этапа отвечают на «Что?», третий — «Как?», четвёртый — «Делаем»."],
      ["Этап Планирование/Инициация — что происходит и кто участвует?", "Определяются: бизнес-цели, feasibility study (техническая и финансовая осуществимость), бюджет, сроки, укрупнённый скоуп. Документы: Устав проекта, Business Case. Участники: Спонсор, PM, Бизнес-аналитик, Руководство. Ключевой вопрос: стоит ли вообще делать этот проект?"],
      ["Этап Анализ требований — что происходит и кто участвует?", "Сбор и фиксация требований: что система должна делать (функциональные) и как (нефункциональные). Методы: интервью, воркшопы, анализ существующих процессов. Документы: SRS (Software Requirements Specification), User Stories, Use Cases. Участники: BA, PO, PM, заказчик, ключевые пользователи."],
      ["Этап Проектирование (Design) — что происходит и кто участвует?", "Архитекторы и лиды разработчиков определяют: архитектуру системы, схему БД, технологический стек, API-контракты, UX/UI макеты. Документы: Architecture Decision Records (ADR), HLD (High Level Design), LLD (Low Level Design), макеты в Figma. Участники: Solution Architect, Tech Lead, UI/UX Designer, BA."],
      ["Этап Разработка (Implementation) — что происходит и кто участвует?", "Команда разработки пишет код согласно дизайну и требованиям. Процессы: Code Review, CI/CD, ветки в Git. PM отслеживает прогресс через Jira, снимает блокеры. Участники: разработчики (Frontend, Backend, Mobile), DevOps/Infra инженер, PM. Ключевые метрики: Velocity, Burndown."],
      ["Этап Тестирование (Testing) — что происходит и кто участвует?", "QA-инженеры проверяют соответствие требованиям. Виды тестирования: функциональное, регрессионное, нагрузочное, UAT (User Acceptance Testing). Документы: Test Plan, Test Cases, Bug Reports. Участники: QA Engineer, QA Lead, разработчики (исправляют баги), иногда конечные пользователи (UAT). PM отслеживает % закрытых дефектов."],
      ["Этап Внедрение (Deployment) — что происходит и кто участвует?", "Готовый продукт разворачивается в продакшен. Процессы: деплой (CI/CD pipeline), переключение трафика (Blue-Green/Canary), мониторинг после релиза, обучение пользователей. Документы: Release Notes, Deployment Plan, Rollback Plan. Участники: DevOps/Infra, PM, Tech Lead, служба поддержки. PM координирует go-live."],
      ["Этап Эксплуатация и поддержка — что происходит и кто участвует?", "Система работает в продакшене. Команда: устраняет баги (hotfix), выпускает патчи, добавляет новые фичи (новые итерации SDLC), мониторит performance и доступность. Участники: DevOps (мониторинг), Support (L1/L2), разработчики (L3), PM (управление приоритетами). Документы: Incident Reports, Change Requests."],
      ["Этап Снятие с эксплуатации — что происходит?", "Продукт теряет актуальность или заменяется новым. Процесс: разработка стратегии перехода, уведомление пользователей, миграция данных, постепенное отключение (не резкое!), архивирование документации. Пример: замена десктопного приложения веб-версией — постепенно переводят пользователей, обучают, потом отключают старое."],
      ["Что такое Discovery Phase и зачем она нужна?", "Discovery Phase — этап глубокого исследования перед стартом разработки. Цель: валидировать бизнес-гипотезы, понять пользователей, определить скоуп MVP. Включает: UX-исследования, интервью с пользователями, анализ конкурентов, технический анализ. Позволяет НЕ тратить бюджет на разработку того, что никому не нужно."],
      ["Чем SDLC по Waterfall отличается от Agile SDLC?", "Waterfall: этапы строго последовательны, требования фиксируются в начале, нет возврата на предыдущий этап, один релиз в конце. Подходит для стабильных, хорошо понятых требований. Agile SDLC: все этапы повторяются в каждом спринте, требования могут меняться, частые релизы. Подходит для продуктов с неопределёнными требованиями."],
      ["Какие документы создаются в SDLC?", "Инициация: Устав проекта, Business Case. Анализ: SRS, User Stories. Проектирование: ADR, HLD, LLD, макеты. Разработка: Code в Git, API документация (Swagger). Тестирование: Test Plan, Test Cases. Внедрение: Release Notes, Deployment Plan. Поддержка: Incident Reports. Завершение: Lessons Learned, архив документации."],
      ["Что такое критерии перехода между этапами SDLC?", "Каждый этап должен иметь чёткий выход (Definition of Done для этапа). Примеры: переход в Design только после sign-off требований заказчиком. Переход в Testing только при успешном прохождении Code Review. Переход в Deployment только при прохождении всех Test Cases и UAT. Без критериев — команда начинает следующий этап с незакрытыми рисками."],
      ["Кто такой PM на каждом этапе SDLC?", "Инициация: формирует устав, согласовывает с заказчиком. Анализ: организует сбор требований, управляет ожиданиями. Проектирование: согласовывает архитектурные решения, контролирует сроки. Разработка: снимает блокеры, трекает прогресс в Jira. Тестирование: управляет дефектами, принимает решение о go/no-go. Деплой: координирует релиз. Поддержка: управляет change requests."],
    ]
  },
  {
    id: 19, color: "c1",
    name: "Agile-манифест: 4 ценности и 12 принципов",
    cards: [
      ["Что такое Agile и откуда он появился?", "Agile — семейство гибких подходов к разработке ПО. Появился в 2001 году: 17 практиков подписали Agile Manifesto в ответ на проблемы тяжёлых методологий (Waterfall). Суть: короткие итерации, частая обратная связь, адаптация к изменениям. Agile — это ценности и принципы, а не конкретный метод."],
      ["Перечисли 4 ценности Agile-манифеста.", "1) Люди и взаимодействие важнее процессов и инструментов. 2) Работающий продукт важнее исчерпывающей документации. 3) Сотрудничество с заказчиком важнее согласования условий контракта. 4) Готовность к изменениям важнее следования плану. Важно: правая сторона тоже ценна, левая — просто ценится больше."],
      ["Объясни первую ценность: «Люди и взаимодействие важнее процессов и инструментов».", "Инструменты и процессы помогают, но не заменяют живое общение. Если команда не умеет разговаривать — никакой Jira не поможет. Практические следствия: Daily Standup для синхронизации, прямое общение разработчика с заказчиком, парное программирование. Процессы подстраиваются под людей, а не наоборот."],
      ["Объясни вторую ценность: «Работающий продукт важнее документации».", "Цель — рабочий продукт у клиента, а не папка с документами. Документация нужна, но не должна становиться самоцелью. Практически: минимально достаточная документация (just enough), документация живёт рядом с кодом (README, Swagger), приоритет — демо работающей функции, а не презентация о ней."],
      ["Объясни третью ценность: «Сотрудничество с заказчиком важнее контракта».", "Заказчик — партнёр, а не противник. Жёсткий контракт с фиксированным скоупом не позволяет адаптироваться к реальным потребностям. Практически: частые демо и обратная связь, Product Owner вовлечён в команду, совместное решение проблем, а не «это не входило в ТЗ»."],
      ["Объясни четвёртую ценность: «Готовность к изменениям важнее следования плану».", "Требования меняются — это нормально, особенно в долгих проектах. Plan → Do → Check → Adapt. Практически: backlog refinement позволяет переприоритизировать, короткие спринты снижают стоимость изменений, план — ориентир, а не клетка. Изменение требований — не провал PM, а признак обучения."],
      ["Назови принципы Agile 1-4.", "1) Наивысший приоритет — удовлетворение заказчика через раннюю и непрерывную поставку ценного ПО. 2) Изменения требований приветствуются, даже в конце разработки. 3) Работающий продукт поставляется часто (несколько недель, не месяцев). 4) Бизнес и разработчики работают вместе ежедневно на протяжении всего проекта."],
      ["Назови принципы Agile 5-8.", "5) Проекты создаются мотивированными людьми, которым нужно доверять. 6) Самый эффективный способ обмена информацией — личный разговор. 7) Работающий продукт — главная мера прогресса. 8) Agile-процессы поддерживают устойчивый темп разработки (sustainable pace)."],
      ["Назови принципы Agile 9-12.", "9) Постоянное внимание к техническому совершенству и качеству проектирования. 10) Простота (искусство максимизировать объём не выполняемой работы) существенна. 11) Лучшие архитектуры, требования и дизайн возникают у самоорганизующихся команд. 12) Команда регулярно размышляет, как стать эффективнее, и корректирует поведение (ретроспектива)."],
      ["Чем Agile отличается от Waterfall на практике?", "Waterfall: требования → всё проектирование → вся разработка → всё тестирование → один релиз. Изменения дорогие. Agile: маленькие итерации (спринты), каждый спринт — полный мини-SDLC. Изменения дёшевы. Waterfall лучше при стабильных требованиях и регуляторных ограничениях. Agile лучше при неопределённости и необходимости быстрой обратной связи."],
      ["Когда Agile НЕ подходит?", "Проекты с жёстко фиксированными требованиями по закону (ядерная, авиационная промышленность). Проекты с фиксированным бюджетом и скоупом (Fix Price контракт). Малые команды с очень конкретным и понятным заданием. Организации с культурой контроля и иерархии, где командам не доверяют принимать решения. Agile без поддержки менеджмента провалится."],
      ["Что такое Agile-фреймворки? Назови основные.", "Agile — это принципы. Фреймворки — их реализации: Scrum (итерации, роли, артефакты — самый популярный). Kanban (поток, WIP-лимиты). XP (Extreme Programming — техническое качество). SAFe (Scaled Agile Framework — для больших организаций). LeSS (Large Scale Scrum). DAD (Disciplined Agile Delivery)."],
      ["Что такое Agile-трансформация?", "Переход организации от традиционных методов управления к Agile-подходам. Затрагивает: культуру (доверие, прозрачность), структуру (кросс-функциональные команды), процессы (спринты, ретро), инструменты. Ключевые условия успеха: поддержка топ-менеджмента, обучение, терпение (занимает 1-3 года). Главный барьер — культура и страх изменений."],
      ["Что такое Agile Mindset?", "Agile Mindset — набор убеждений: неопределённость нормальна и управляема. Ошибки — источник обучения, а не провал. Сотрудничество эффективнее индивидуальной работы. Постоянное улучшение важнее совершенства с первого раза. Люди важнее процессов. Без Agile Mindset формальное внедрение Scrum не даст результатов."],
      ["В чём разница между Agile и Scrum?", "Agile — набор ценностей и принципов (манифест). Scrum — конкретный фреймворк для реализации Agile. Scrum prescriptive (предписывает конкретные роли, события, артефакты). Можно быть Agile и не использовать Scrum (например, Kanban-команда тоже Agile). Scrum — самый популярный Agile-фреймворк, используется в ~70% Agile-команд."],
    ]
  },
  {
    id: 20, color: "c2",
    name: "Scrum и Kanban: метрики",
    cards: [
      ["Что такое Velocity в Scrum?", "Velocity — количество Story Points, выполненных командой за спринт. Измеряется как среднее за последние 3-5 спринтов. Используется для: прогнозирования (сколько SP войдёт в следующий спринт), планирования релиза (когда будет готов бэклог). Нельзя сравнивать Velocity разных команд — у каждой своя шкала SP."],
      ["Что такое Burndown Chart и как его читать?", "График сгорания работы за спринт. Ось X — дни, ось Y — оставшиеся Story Points. Идеальная линия — прямая от общего объёма спринта к нулю. Реальная выше идеала — команда отстаёт (риск не выполнить спринт). Ниже — опережает или задачи оказались проще. Резкий скачок вниз в середине — возможно, задачи переоценены."],
      ["Что такое Burnup Chart? Чем отличается от Burndown?", "Burnup Chart показывает рост выполненной работы (снизу вверх), а также изменение общего объёма. Две линии: выполненные SP и общий объём бэклога. Преимущество перед Burndown: видно, если скоуп увеличился (верхняя линия ползёт вверх). Burndown не показывает изменения скоупа. Burnup — более честное отражение реальности."],
      ["Что такое Cumulative Flow Diagram (CFD)?", "CFD — многослойный график, показывающий количество задач в каждом статусе (To Do, In Progress, Done) по дням. Позволяет увидеть: узкие места (если один статус разрастается), WIP-уровень, стабильность потока. Широкий слой In Progress — сигнал о накоплении незавершённой работы. Ключевой инструмент Kanban."],
      ["Что такое Cycle Time в Kanban?", "Cycle Time — время от момента начала работы над задачей до её завершения. Измеряется в рабочих днях. Нужен для: прогнозирования срока выполнения задачи, выявления узких мест. Снизить Cycle Time можно: уменьшив WIP-лимиты, устранив блокеры, улучшив процесс Code Review. Цель — стабильный и предсказуемый Cycle Time."],
      ["Что такое Lead Time?", "Lead Time — полное время от момента поступления запроса (создания задачи) до её завершения. Включает время ожидания в очереди + Cycle Time. Интересен заказчику: «как долго ждать выполнения моего запроса?». Cycle Time — команде: «сколько мы работаем?». Lead Time всегда ≥ Cycle Time. Уменьшается сокращением очереди и WIP."],
      ["Что такое Throughput?", "Throughput — количество задач, завершённых командой за единицу времени (например, задач/неделю). Метрика потока в Kanban. Используется для прогнозирования: если Throughput = 10 задач/неделю, то 100 задач в бэклоге = ~10 недель. Стабильный Throughput → предсказуемый процесс. В отличие от Velocity не зависит от Story Points."],
      ["Что такое WIP-лимиты в Kanban и зачем они нужны?", "WIP (Work In Progress) лимит — максимальное количество задач, одновременно находящихся в одном статусе (например, не более 3 задач In Progress на человека). Зачем: предотвращает перегрузку, ускоряет выполнение (фокус), выявляет узкие места (если лимит постоянно достигается — узкое место). Принцип: stop starting, start finishing."],
      ["Что такое Sprint Goal Achievement?", "Метрика, показывающая, достигла ли команда цели спринта. Бинарная (да/нет) или процентная. Отличается от Velocity: можно выполнить 80% SP, но достичь Sprint Goal. Или выполнить 100% SP, но Goal не достигнута. Цель важнее объёма. Отслеживается на Sprint Review. Систематически низкий показатель — сигнал о проблемах с планированием."],
      ["Что такое Defect Rate / Defect Density?", "Defect Rate — количество дефектов, найденных за период (спринт, релиз). Defect Density — количество дефектов на единицу кода (например, на 1000 строк). Sneak-through rate — % дефектов, прорвавшихся в продакшен. Высокий Defect Rate: недостаточное тестирование, плохое качество кода, неясные требования. Метрика качества для QA и команды."],
      ["Что такое Story Point Accuracy?", "Насколько точно команда оценивала задачи. Вычисляется: запланированные SP в спринт vs фактически выполненные (если брали 30 SP и сделали 30 — точность 100%). Систематическое перевыполнение — задачи переоценены. Систематическое недовыполнение — недооценены или появляются непредвиденные задачи. Улучшается через регулярный Refinement и ретроспективу."],
      ["Как рассчитать прогноз даты релиза через Velocity?", "Формула: оставшиеся SP в бэклоге / средняя Velocity = количество спринтов до релиза. Пример: 150 SP в бэклоге, Velocity = 30 SP/спринт → 5 спринтов × 2 недели = 10 недель. Добавить буфер 10-20% на непредвиденное. Учесть: праздники, отпуска, рефакторинг. Регулярно пересчитывать по мере обновления бэклога."],
      ["Чем метрики Scrum отличаются от метрик Kanban?", "Scrum: Velocity (SP/спринт), Sprint Goal Achievement, Burndown Chart — итерационные метрики. Kanban: Cycle Time, Lead Time, Throughput, WIP, CFD — метрики потока. Scrum измеряет производительность итерации. Kanban измеряет скорость и стабильность потока задач. Оба подхода можно комбинировать (Scrumban)."],
      ["Что такое метрика Team Happiness / Team Health?", "Субъективная оценка состояния команды. Измеряется анонимно: 1-5 звёзд или NPS-опрос после каждого спринта/ретроспективы. Вопросы: «Я доволен скоростью нашей работы», «Я понимаю цели проекта», «Я чувствую поддержку команды». Падение Team Happiness — ранний сигнал о проблемах (выгорание, конфликты, технический долг)."],
      ["Как использовать метрики на ретроспективе?", "Показывать метрики команде, а не использовать против неё. Burndown показал проблему в середине спринта → обсудить причины, не искать виноватых. Cycle Time вырос → найти узкое место вместе. Velocity упала → что изменилось? Метрики — индикаторы для улучшения, а не KPI для наказания. Принцип: данные для разговора, а не для отчёта руководству."],
    ]
  },
  {
    id: 21, color: "c3",
    name: "Scrum Guide: ценности, роли, церемонии, артефакты",
    cards: [
      ["Назови 5 ценностей Scrum.", "1) Commitment (Обязательство) — команда берёт на себя ответственность за Sprint Goal. 2) Courage (Смелость) — открыто обсуждать проблемы. 3) Focus (Фокус) — на Sprint Goal и работе спринта. 4) Openness (Открытость) — прозрачность работы и трудностей. 5) Respect (Уважение) — к компетентности и независимости друг друга."],
      ["Какие 3 роли определяет Scrum?", "1) Product Owner (PO) — отвечает за ценность продукта, управляет Product Backlog. 2) Scrum Master (SM) — сервант-лидер, помогает команде следовать Scrum, устраняет помехи. 3) Developers (команда разработки) — самоорганизующаяся кросс-функциональная группа, создающая Increment. Вместе они называются Scrum Team."],
      ["Какова роль и обязанности Product Owner?", "PO — единственный человек, ответственный за управление Product Backlog. Обязанности: формулировать и коммуницировать Product Goal, создавать и приоритизировать Backlog Items, обеспечивать прозрачность бэклога для команды, принимать или отклонять результаты Sprint Review. PO — один человек (не комитет), его решения окончательны."],
      ["Какова роль и обязанности Scrum Master?", "SM — сервант-лидер для всей Scrum Team. Обязанности для команды: коучинг и обучение Scrum, устранение блокеров (impediments), фасилитация событий Scrum. Для PO: помощь в работе с бэклогом, управлении стейкхолдерами. Для организации: внедрение Agile, устранение организационных барьеров. SM не управляет командой — он помогает ей самоорганизоваться."],
      ["Какова роль команды разработки (Developers)?", "Самоорганизующаяся кросс-функциональная группа (3-9 человек). Обязанности: планирование Sprint Backlog, обеспечение качества (DoD), ежедневная адаптация плана работы, взаимная ответственность за Sprint Goal. Нет иерархии внутри команды, нет суб-команд. Все несут ответственность совместно, даже если у людей разные специализации."],
      ["Что такое Спринт (Sprint) по Scrum Guide?", "Спринт — сердце Scrum. Фиксированный временной бокс не более 1 месяца (обычно 2 недели). В каждом спринте: Sprint Planning → Daily Scrums → работа → Sprint Review → Sprint Retrospective. Спринт нельзя продлить. Отменить может только PO (если Sprint Goal стала неактуальной). Новый спринт начинается сразу после завершения предыдущего."],
      ["Что такое Sprint Planning?", "Открывает спринт. Максимум 8 часов для месячного спринта. Три вопроса: 1) Почему этот спринт ценен? (→ Sprint Goal). 2) Что можно выполнить в этом спринте? (→ отбор из Backlog). 3) Как выбранная работа будет выполнена? (→ декомпозиция на задачи дня). Sprint Goal — обязательство команды на спринт, единое для всех."],
      ["Что такое Daily Scrum?", "15-минутное ежедневное событие для Developers. Цель: проинспектировать прогресс к Sprint Goal и адаптировать план. Структура свободная (не обязательно три вопроса «что сделал/сделаю/блокеры»). Ключевое: это не статусный отчёт для SM или PM, это планирование дня командой. Повышает прозрачность и выявляет блокеры."],
      ["Что такое Sprint Review?", "Событие в конце спринта. Максимум 4 часа для месячного спринта. Scrum Team + стейкхолдеры вместе инспектируют Increment и обсуждают прогресс к Product Goal. PO поясняет, что выполнено, что нет. Команда демонстрирует работу. Стейкхолдеры дают обратную связь. Бэклог корректируется. Sprint Review — рабочая сессия, не шоу-презентация."],
      ["Что такое Sprint Retrospective?", "Завершает спринт. Максимум 3 часа для месячного спринта. Команда инспектирует: как работалось (люди, взаимодействия, процессы, инструменты). Выявляет улучшения. Создаёт план улучшений для следующего спринта. Фокус: как работала команда, а не что создавалось (это Sprint Review). Результат: 1-3 конкретных action item."],
      ["Что такое Product Backlog?", "Упорядоченный список всего, что нужно сделать для продукта. Единственный источник работы для команды. Ведёт PO. Никогда не бывает «завершённым» — эволюционирует вместе с продуктом. Верхние элементы: детально проработаны, оценены, готовы к работе (DoR). Нижние: крупные, расплывчатые, низкоприоритетные. Backlog Refinement — регулярная работа PO+команды."],
      ["Что такое Sprint Backlog?", "Состоит из: Sprint Goal (зачем), набора Product Backlog Items, выбранных на Sprint Planning (что), плана для выполнения Increment (как). Принадлежит Developers, только они могут изменять его в процессе спринта. Видимый в реальном времени план работы. Обновляется ежедневно. Если работы больше, чем думали — обсуждают с PO."],
      ["Что такое Increment?", "Конкретный шаг к Product Goal. Каждый Increment: завершён, работает, соответствует DoD, добавляет ценность ко всем предыдущим Increment. Может быть несколько Increment за спринт. PO решает, поставлять ли Increment заказчику, но он должен быть готов к поставке независимо от этого решения. Нет Increment без DoD."],
      ["Что такое Product Goal?", "Долгосрочная цель Scrum Team, описывающая будущее состояние продукта. Находится в Product Backlog. Команда должна достичь или отказаться от Product Goal до постановки новой. Sprint Goals — шаги к Product Goal. Product Goal отвечает на вопрос: «Ради чего мы создаём этот продукт?» Вводится в Scrum Guide 2020 как замена «видению продукта»."],
      ["Что такое Backlog Refinement?", "Не официальное событие Scrum, но необходимая активность: PO + Developers регулярно (1-2 раза в спринт) уточняют и оценивают верхние элементы бэклога. Результат: детализированные User Stories, критерии приёмки, Story Points. Подготовка к следующему Sprint Planning. Занимает не более 10% ёмкости команды. Без Refinement Sprint Planning — хаос."],
    ]
  },
  {
    id: 22, color: "c4",
    name: "DoR и DoD",
    cards: [
      ["Что такое DoR (Definition of Ready)?", "DoR — соглашение команды о критериях готовности задачи к разработке. Задача «готова» только если удовлетворяет всем критериям DoR. Аналогия: DoR — это чеклист пилота перед взлётом. Цель: не брать в спринт задачи, которые нельзя выполнить из-за неопределённости. Создаётся командой, применяется на Backlog Refinement и Sprint Planning."],
      ["Что такое DoD (Definition of Done)?", "DoD — соглашение команды о критериях завершённости работы. Задача «сделана» только если соответствует всем критериям DoD. Аналогия: DoD — это стандарт качества продукта на выходе. Обеспечивает прозрачность: все понимают, что значит «готово». Без DoD у каждого своё понимание «сделано» → технический долг и дефекты."],
      ["В чём разница между DoR и DoD?", "DoR — о готовности задачи ВОЙТИ в разработку. Применяется на входе в спринт/разработку. DoD — о готовности задачи ВЫЙТИ в продукт/релиз. Применяется на выходе. DoR: «Можем ли мы начать работу?» DoD: «Можем ли мы считать работу завершённой?» Обе нужны: DoR снижает waste, DoD гарантирует качество."],
      ["Приведи 5 типичных критериев DoR для User Story.", "1) У Story есть описание в формате «Как [роль], я хочу [действие], чтобы [ценность]». 2) Acceptance Criteria написаны и согласованы с PO. 3) Story оценена в Story Points командой. 4) Story не блокирована внешними зависимостями. 5) UI/UX макет готов и согласован (если применимо). Дополнительно: Story вмещается в один спринт (т.е. ≤ X SP)."],
      ["Приведи 5 типичных критериев DoD для задачи разработки.", "1) Код написан и соответствует code style. 2) Unit-тесты написаны и проходят (покрытие ≥ X%). 3) Code Review пройден (минимум 1 approve). 4) Нет open критических и высоких дефектов. 5) Задача задеплоена на test/staging-окружение. Дополнительно: Acceptance Criteria проверены QA, документация обновлена."],
      ["Приведи критерии DoD для спринта.", "1) Все задачи спринта соответствуют DoD для задач. 2) Sprint Goal достигнута. 3) Increment продемонстрирован на Sprint Review и одобрен PO. 4) Регрессионное тестирование пройдено. 5) Product Backlog обновлён с учётом новых данных. 6) Ретроспектива проведена, action items зафиксированы."],
      ["Приведи критерии DoD для релиза.", "1) Все Sprint DoD выполнены. 2) Нагрузочное тестирование проведено и результаты приемлемы. 3) Security review пройден. 4) Release Notes написаны. 5) Rollback Plan готов. 6) Мониторинг и алёрты настроены. 7) Команда поддержки обучена. 8) Stakeholder sign-off получен."],
      ["Что такое INVEST для User Story?", "INVEST — акроним критериев хорошей User Story: I — Independent (независима от других историй). N — Negotiable (условия обсуждаемы). V — Valuable (несёт ценность для пользователя). E — Estimable (можно оценить в SP). S — Small (вмещается в спринт). T — Testable (есть чёткие Acceptance Criteria). Используется как DoR для Stories."],
      ["Как создать DoR в команде?", "Воркшоп с командой: 1) Каждый называет, что ему нужно для начала работы над задачей. 2) Группируем и обсуждаем. 3) Голосуем за критерии. 4) Фиксируем в Confluence. 5) Применяем несколько спринтов → ретроспектива → корректируем. DoR должна быть реалистичной — слишком строгая заблокирует спринты, слишком мягкая — бесполезна."],
      ["Как создать DoD в команде?", "Воркшоп: 1) Перечислить всё, что нужно сделать, чтобы задача была «настоящей» готовностью. 2) Голосование за обязательные vs желательные критерии. 3) Зафиксировать в Confluence. 4) Разместить на виду (Confluence, стена). Постепенно расширять: начать с базового DoD → добавлять критерии по мере зрелости команды (автотесты, security check)."],
      ["Как DoR связан с Backlog Refinement?", "Refinement — основное место применения DoR. На Refinement PO + команда проверяют каждую Story по критериям DoR: есть ли Acceptance Criteria? Оценена ли? Есть ли макет? Если Story не соответствует DoR — она не берётся в Sprint Planning. Это предотвращает ситуацию «начали делать и не знаем что делать». Refinement = подготовка Stories к DoR."],
      ["Как DoD влияет на технический долг?", "Отсутствие DoD → команда считает задачу готовой без тестов, без code review, без документации → накапливается технический долг. DoD включающий 'unit tests written', 'no critical bugs' → технический долг не накапливается. Ключевой принцип: DoD должен исключать скрытый технический долг. Снижение DoD ради скорости — краткосрочная экономия, долгосрочная проблема."],
      ["Типичные ошибки при работе с DoR.", "1) DoR слишком расплывчатый («задача понятна» — у всех разное понимание). 2) DoR не применяется на Sprint Planning — берут неготовые задачи. 3) DoR одинаков для всех типов задач (Bug vs Feature vs Tech Task). 4) DoR не обновляется — устаревает. 5) DoR существует только на бумаге, команда его не использует в реальной работе."],
      ["Типичные ошибки при работе с DoD.", "1) DoD слишком мягкий — «код написан» без тестирования. 2) DoD не применяется — задача закрывается без проверки. 3) DoD разный у разных членов команды (нет единого соглашения). 4) DoD не эволюционирует — не добавляются новые стандарты качества. 5) DoD подгоняется под задачу — если задача не проходит, меняют DoD, а не дорабатывают задачу."],
      ["Чем DoD отличается от Acceptance Criteria?", "Acceptance Criteria — специфичны для конкретной User Story ('при вводе неверного пароля показывается сообщение об ошибке'). DoD — применяется ко ВСЕМ задачам ('code review пройден', 'unit tests написаны'). Acceptance Criteria проверяет функциональность. DoD проверяет качество процесса. Задача должна соответствовать ОБОИМ: и своим Acceptance Criteria, и общему DoD."],
    ]
  },
  {
    id: 23, color: "c5",
    name: "Техники эстимации задач",
    cards: [
      ["Что такое эстимация задач и зачем она нужна?", "Эстимация — оценка объёма, сложности или длительности задачи. Нужна для: планирования спринта (сколько войдёт), прогнозирования дат релиза, расстановки приоритетов, управления ожиданиями стейкхолдеров. Важно: оценка всегда приблизительна, цель — достаточная точность для принятия решений, а не абсолютная точность."],
      ["В чём разница между оценкой в Story Points и в часах?", "Story Points — относительная оценка сложности (сравниваем задачи между собой). Не зависит от конкретного исполнителя. Учитывает: объём работы, сложность, неопределённость. Часы — абсолютная оценка времени конкретного человека. Story Points устойчивее: разные разработчики сделают задачу за разное время, но сложность относительно одинакова. Velocity в SP стабильнее velocity в часах."],
      ["Что такое Planning Poker и как он проводится?", "Групповая техника оценки в Story Points. Процесс: PO зачитывает User Story. Каждый участник тайно выбирает карту (числа Фибоначчи: 1,2,3,5,8,13,21,?). Все открывают одновременно. Если оценки совпадают — принимается. Если расходятся — обсуждаем крайние оценки. Повторяем до консенсуса. Преимущество: исключает anchoring-эффект (влияние первого голоса)."],
      ["Что такое последовательность Фибоначчи в эстимации и почему её используют?", "1, 2, 3, 5, 8, 13, 21, 34… Каждое число — сумма двух предыдущих. В оценках: маленькие задачи оцениваются точно (1,2,3). Крупные — приблизительно (8,13,21). Нет смысла различать задачи на 11 и 12 SP — точность иллюзорна. Нелинейность отражает возрастание неопределённости с размером задачи. Также используют упрощённую шкалу: 1,2,3,5,8,13."],
      ["Что такое T-shirt sizing (размеры футболок)?", "Оценка задач в условных размерах: XS, S, M, L, XL, XXL. Быстрая и интуитивная техника для грубой оценки эпиков и больших задач на этапе планирования продукта. Позже размеры конвертируются в SP (XS=1, S=2, M=3, L=5, XL=8). Преимущество: убирает ложную точность, легко объяснить бизнесу. Используется для roadmap-планирования."],
      ["Что такое трёхточечная оценка (PERT)?", "Оценка через три сценария: O (Optimistic) — лучший случай. M (Most Likely) — наиболее вероятный. P (Pessimistic) — худший случай. Формула PERT: E = (O + 4M + P) / 6. Стандартное отклонение: SD = (P - O) / 6. Даёт взвешенную оценку с учётом рисков. Используется в классическом PM (Waterfall, PMBoK), полезна для крупных задач с высокой неопределённостью."],
      ["Что такое Bucket System?", "Быстрая техника для оценки большого количества задач (50+ историй). Процесс: разложить «вёдра» с числами (1,2,3,5,8,13,21). Первую задачу положить в ведро «5» как эталон. Каждую следующую задачу сравнивать с уже положенными: меньше/больше. Занимает 30-60 минут на 50 задач. Используется при грубой оценке целого бэклога."],
      ["Что такое метод аналогий (Analogous Estimation)?", "Оценка новой задачи на основе похожих задач, выполненных ранее. Команда ищет: «Похоже на задачу X, которую мы делали 3 спринта назад — она была 5 SP». Быстро и субъективно. Требует опыта команды. Используется как быстрая проверка и стартовая точка. Точность растёт с опытом команды. Архив выполненных задач — ценный ресурс."],
      ["Что такое Dot Voting для приоритизации оценок?", "Техника голосования при расхождении оценок. Каждый участник получает N точек (наклеек) и распределяет их между вариантами оценок. Наибольшее число точек → принятая оценка. Быстрее планнинг-покера для простых случаев. Также применяется для приоритизации бэклога: команда распределяет точки между задачами."],
      ["Что влияет на точность оценки?", "Снижают точность: размытые требования, незнакомые технологии, зависимость от внешних систем, нет Acceptance Criteria, большой размер задачи. Повышают точность: чёткий DoR, опыт команды с похожими задачами, декомпозиция на маленькие подзадачи, исторические данные о Velocity. Ключевой принцип: оценивать, когда задача готова к оценке (DoR)."],
      ["Чем оценка в Agile отличается от оценки в Waterfall?", "Waterfall: оценка делается один раз в начале, максимально детальная, основана на документации. Часто — фиксированная. Ошибка оценки = перерасход. Agile: оценка — непрерывный процесс, уточняется на каждом Refinement. Крупные эпики оцениваются грубо, задачи в спринт — детально. Неточность ожидаема и закладывается в прогнозы через диапазоны."],
      ["Как оценивать эпики vs Stories vs Tasks?", "Эпики: T-shirt sizing или крупные SP (13,21,40). Грубо, для roadmap. Stories: Planning Poker в SP (1-13). Основная единица оценки. Tasks (подзадачи): иногда в часах (2-8 часов). Для детального планирования. Принцип: точность оценки должна соответствовать уровню. Детальная оценка эпиков — waste. Грубая оценка задач в спринте — риск."],
      ["Что такое буфер в оценке и как его применять?", "Буфер — дополнительное время/SP на неопределённость. Как применять: добавлять 10-20% к прогнозу релиза (не к отдельным задачам). Закладывать buffer sprint — один спринт в квартал без новых фич (на технический долг и непредвиденное). Не прятать буфер в каждую задачу — теряется мотивация к эффективности (закон Паркинсона)."],
      ["Как улучшить точность оценок со временем?", "1) После каждого спринта: сравнивать оценку vs факт (Story Point Accuracy). 2) На ретроспективе: обсуждать задачи с большим расхождением — почему ошиблись? 3) Строить библиотеку эталонных задач — «1 SP выглядит как задача X». 4) Регулярный Refinement с полной командой. 5) Отслеживать стабильность Velocity — нестабильная означает проблемы с оценкой."],
      ["Типичные ошибки при эстимации.", "1) Оценивает один человек, а не команда → теряется коллективное знание. 2) Давление PM/заказчика → команда снижает оценку. 3) Оценка до понимания задачи → без DoR. 4) Путают Story Points с часами → сравнивают Velocity разных команд. 5) Не учитывают тестирование, review, документацию в оценке → недооценка. 6) Не пересматривают оценки при изменении требований."],
    ]
  },
  {
    id: 24, color: "c6",
    name: "Бэклог продукта",
    cards: [
      ["Что такое Product Backlog?", "Product Backlog — упорядоченный список ВСЕГО, что нужно сделать в продукте: новые фичи, улучшения, исправления, технический долг, исследовательские задачи. Единственный источник работы Scrum Team. Никогда не бывает пустым, пока продукт существует. Ведёт PO. Отражает текущее понимание того, что нужно для достижения Product Goal."],
      ["Кто отвечает за Product Backlog?", "Product Owner — единственный владелец бэклога. Отвечает за: содержание (что входит), порядок (приоритеты), прозрачность (понятность для команды), доступность (видна команде в любой момент). PO может делегировать наполнение бэклога, но ответственность остаётся за ним. Команда НЕ может менять порядок приоритетов без PO."],
      ["Что может входить в Product Backlog?", "User Stories (новые фичи). Технический долг (рефакторинг, обновление зависимостей). Баги (дефекты, найденные в продакшене). Исследования/Spikes (изучение технологии, прототип). Нефункциональные требования (производительность, безопасность). Infrastructure work (настройка CI/CD, мониторинг). Всё, что команда должна сделать для развития продукта."],
      ["Что такое Backlog Refinement (Grooming)?", "Регулярная активность (не официальное событие Scrum): PO + Developers уточняют верхние элементы бэклога. Активности: детализация User Stories, написание Acceptance Criteria, оценка в SP, разбивка крупных задач. Занимает ≤10% ёмкости команды (обычно 1-2 сессии по 1-2 часа в спринт). Без Refinement Sprint Planning занимает весь день и заканчивается неразберихой."],
      ["Как приоритизировать бэклог? Метод MoSCoW.", "MoSCoW: Must Have — обязательно для MVP/релиза. Should Have — важно, но не критично. Could Have — желательно, если есть время. Won't Have (this time) — осознанно откладываем. Применение: для определения скоупа релиза или MVP. Прост и понятен бизнесу. Минус: не даёт численного приоритета, сложно сравнивать элементы внутри Must Have."],
      ["Как приоритизировать бэклог? Метод RICE.", "RICE Score = (Reach × Impact × Confidence) / Effort. Reach — сколько пользователей затронет фича за период. Impact — насколько улучшит опыт (1-3-шкала). Confidence — уверенность в оценках (%). Effort — трудозатраты в человеко-месяцах. Задача с наибольшим RICE Score — приоритетнее. Плюс: числовой приоритет, обсуждение на основе данных."],
      ["Как приоритизировать бэклог? Модель Kano.", "Kano делит фичи по влиянию на удовлетворённость: Must-be (базовые ожидания — их отсутствие разочаровывает). Performance (чем больше, тем лучше — прямая зависимость). Attractive (delighters — неожиданно радуют, но их отсутствие не расстраивает). Indifferent (не влияют). Reverse (часть пользователей против). Помогает понять, что создаёт реальную ценность."],
      ["Чем Sprint Backlog отличается от Product Backlog?", "Product Backlog: весь продукт, все горизонты, управляет PO, приоритизируется постоянно. Sprint Backlog: подмножество для текущего спринта + план выполнения, управляет команда разработки, неизменен в части Sprint Goal в течение спринта. Задачи переходят из Product Backlog в Sprint Backlog только на Sprint Planning. Задачи добавляются в Product Backlog в любой момент."],
      ["Как выглядит хорошая User Story в бэклоге?", "Формат: «Как [роль], я хочу [действие], чтобы [ценность]». Плюс: Title (краткое название), Description (детали контекста), Acceptance Criteria (конкретные, тестируемые), Story Points (оценка), Priority, Epic Link, Labels. Критерии INVEST: Independent, Negotiable, Valuable, Estimable, Small, Testable. Хорошая Story понятна без устных объяснений."],
      ["Что такое Epic и как он связан с бэклогом?", "Epic — большая User Story или инициатива, которая слишком велика для одного спринта. Разбивается на User Stories. В Jira: Epic содержит Stories через поле Epic Link. В бэклоге: Epics — верхний уровень планирования (roadmap), Stories — детальный уровень (спринт). PO управляет и Эпиками, и Stories. Roadmap состоит из Epics."],
      ["Что такое Icebox в бэклоге?", "Icebox — «замороженный» раздел бэклога: идеи и задачи, которые не приоритизируются сейчас, но не удаляются. Почему важен: сохраняет идеи для будущего, не захламляет активный бэклог, позволяет вернуться к идее, когда изменится контекст. В Jira: статус «Won't Do» или отдельный лейбл 'icebox'. Регулярно пересматривается и очищается (раз в квартал)."],
      ["Как управлять техническим долгом в бэклоге?", "Технический долг — задачи, которые не несут прямой ценности пользователю, но необходимы для здоровья системы. Стратегии: выделять 20% ёмкости спринта на tech debt. Создавать отдельный тип задач или лейбл 'tech-debt'. Привязывать tech debt к бизнес-обоснованию («замедляет разработку», «увеличивает баги»). PO должен понимать ценность инвестиций в качество."],
      ["Признаки здорового бэклога.", "1) Верхние 1-2 спринта детализированы и соответствуют DoR. 2) Порядок отражает текущие бизнес-приоритеты. 3) Нет дублирующихся задач. 4) Есть баланс: фичи + баги + tech debt. 5) Все задачи имеют описание (не просто «сделать кнопку»). 6) PO регулярно общается с командой на Refinement. 7) Команда может объяснить, почему задача приоритетна."],
      ["Признаки нездорового бэклога.", "1) Сотни задач без приоритетов («кладбище идей»). 2) Задачи из 2021 года как актуальные. 3) Нет Acceptance Criteria у большинства историй. 4) Sprint Planning занимает полдня и всё равно непонятно что делать. 5) PO не участвует в Refinement. 6) Команда не понимает, зачем делает задачи. 7) Нет связи задач с Product Goal или бизнес-целями."],
      ["Как PO работает с командой над бэклогом?", "PO не пишет задачи в одиночку. Процесс: PO формирует идеи → обсуждает с командой на Refinement (команда добавляет техническую перспективу) → вместе детализируют Acceptance Criteria → команда оценивает → PO расставляет приоритеты. PO — «что и зачем», команда — «как и сколько». Совместная работа над бэклогом повышает качество и вовлечённость."],
    ]
  },
  {
    id: 25, color: "c7",
    name: "Реестр рисков: теория и практика",
    cards: [
      ["Что такое риск в IT-проекте?", "Риск — неопределённое событие или условие, которое при реализации положительно или отрицательно влияет на цели проекта (сроки, бюджет, качество, скоуп). Риск ≠ проблема (Issue): риск может случиться, проблема уже произошла. Управление рисками — проактивная работа: выявить → оценить → запланировать реакцию → мониторить."],
      ["Что такое реестр рисков (Risk Register)?", "Risk Register — документ, централизованно хранящий все идентифицированные риски проекта. Содержит: описание риска, вероятность, влияние, приоритет, стратегию реагирования, ответственного, статус. Ведётся PM на протяжении всего проекта. Обновляется регулярно (минимум раз в спринт). Хранится в Confluence/Jira/Excel."],
      ["Какие поля должны быть в реестре рисков?", "Обязательные: ID риска, Описание риска, Категория (технический/организационный/финансовый…), Вероятность (1-5 или Low/Mid/High), Влияние (1-5), Рейтинг (Вероятность × Влияние), Стратегия реагирования, Ответственный, Статус (открыт/закрыт/реализован). Дополнительные: Дата выявления, Триггер (сигнал реализации), Residual Risk, Contingency Plan."],
      ["Назови 4 стратегии работы с негативными рисками.", "1) Avoid (Избежать) — изменить план проекта, чтобы риск не мог реализоваться (например, сменить технологию). 2) Transfer (Передать) — переложить последствия на третью сторону (страховка, фиксированный контракт с вендором). 3) Mitigate (Снизить) — уменьшить вероятность или влияние риска (прототип, доп. тестирование). 4) Accept (Принять) — осознанно принять риск (активное: с планом contingency; пассивное: без плана)."],
      ["Как строится матрица рисков?", "Матрица 5×5: по осям — Вероятность (1-5) и Влияние (1-5). Рейтинг = В × П. Зоны: 1-4 (зелёная) — низкий риск, мониторинг. 5-9 (жёлтая) — средний, план реагирования. 10-25 (красная) — высокий, немедленные меры. Визуализирует приоритеты. Отображается в реестре рисков и обновляется при изменении статуса рисков."],
      ["ТОП технических рисков IT-проекта (5 примеров).", "1) Выбранная технология оказалась неподходящей для задачи. 2) Интеграция с legacy-системой заказчика занимает в 3× больше времени. 3) Производительность не соответствует нагрузочным требованиям. 4) Критическая уязвимость в используемой библиотеке. 5) Потеря данных при миграции базы данных. Стратегии: прототипирование, нагрузочные тесты, security review заранее."],
      ["ТОП рисков требований (5 примеров).", "1) Заказчик меняет требования в середине разработки. 2) Требования противоречат друг другу (разные стейкхолдеры хотят разного). 3) Требования неполные — выясняется только в процессе разработки. 4) Заказчик не доступен для уточнений (занят, в отпуске). 5) Требования к интеграции с внешней системой неверно описаны. Стратегии: sign-off требований, DoR, регулярные демо."],
      ["ТОП рисков команды и ресурсов (5 примеров).", "1) Уход ключевого разработчика в разгар проекта. 2) Болезнь нескольких членов команды одновременно. 3) Разработчик переоценил свои возможности — задача сложнее. 4) Конфликт внутри команды, снижающий производительность. 5) Нехватка компетенции (никто не знает новую технологию). Стратегии: документирование знаний, перекрёстное обучение, bus factor анализ."],
      ["ТОП рисков коммуникации (5 примеров).", "1) Заказчик не участвует в Sprint Review — обратная связь запаздывает. 2) Недопонимание между командой и заказчиком из-за языкового барьера. 3) Стейкхолдеры не выровнены по ожиданиям (каждый хочет своего). 4) Критическое решение принято без PM — команда узнала постфактум. 5) Клиент не согласовывает документы вовремя. Стратегии: communication plan, RACI, регулярные статус-репорты."],
      ["ТОП рисков сроков и планирования (5 примеров).", "1) Зависимость от другой команды, которая отстаёт. 2) Неверная оценка трудозатрат (задачи оказались сложнее). 3) Scope creep — постоянное добавление новых задач. 4) Технический долг замедляет разработку новых фич. 5) Регуляторные согласования занимают больше времени, чем ожидалось. Стратегии: буфер времени, управление изменениями, реестр зависимостей."],
      ["ТОП финансовых рисков (5 примеров).", "1) Курс валюты изменился — бюджет в инвалюте вырос. 2) Заказчик задержал оплату — кассовый разрыв. 3) Непредвиденные расходы на лицензии/инфраструктуру. 4) Необходимость дополнительного найма из-за ухода сотрудника. 5) Штрафные санкции по контракту за нарушение сроков. Стратегии: contingency reserve (10-20% бюджета), валютное хеджирование, чёткие payment terms в контракте."],
      ["Чем риск отличается от проблемы (Risk vs Issue)?", "Риск — событие, которое МОЖЕТ случиться в будущем (вероятность < 100%). Требует планирования реакции заранее. Issue (проблема) — событие, которое УЖЕ произошло и требует немедленных действий. Пример: «Ключевой разработчик может уволиться» — риск. «Ключевой разработчик уволился» — issue. PM ведёт как Risk Register, так и Issue Log."],
      ["Как идентифицировать риски в начале проекта?", "Техники: Brainstorming с командой (обычно 1-2 часа). Checklist на основе прошлых проектов. SWOT-анализ. Интервью с экспертами и стейкхолдерами. Анализ документации (контракт, ТЗ — ищем неопределённость). Root Cause Analysis аналогичных прошлых проблем. Важно: идентификацию рисков проводить регулярно, а не только в начале проекта."],
      ["Что такое Residual Risk и Secondary Risk?", "Residual Risk — остаточный риск после применения стратегии реагирования. Пример: внедрили автотесты (mitigation) → вероятность дефектов снизилась, но не до нуля. Residual Risk = то, что осталось. Secondary Risk — новый риск, порождённый самой стратегией реагирования. Пример: добавили encryption (mitigation) → Secondary Risk: performance degradation из-за шифрования."],
      ["Как обновлять и мониторить реестр рисков?", "Частота обновлений: как минимум раз в спринт (в рамках ретроспективы или отдельной встречи). Активности: проверить статус каждого открытого риска. Закрыть реализовавшиеся риски → перевести в Issue Log. Обновить вероятность/влияние при изменении контекста. Добавить новые риски. Обсудить триггеры (признаки приближающейся реализации). PM демонстрирует реестр рисков на статус-митинге."],
    ]
  },
];

// State
let currentDeck = [];
let currentIndex = 0;
let isFlipped = false;
let activeSectionId = 0; // 0 = all
let ratings = {}; // cardId -> 'know'|'unsure'|'dontknow'

// Build flat deck
function buildDeck(sectionId, onlyWrong = false) {
  let cards = [];
  SECTIONS.forEach(sec => {
    if (sectionId === 0 || sec.id === sectionId) {
      sec.cards.forEach((card, i) => {
        const id = `${sec.id}-${i}`;
        if (!onlyWrong || ratings[id] === 'dontknow' || ratings[id] === 'unsure') {
          cards.push({ id, sectionId: sec.id, sectionName: sec.name, color: sec.color, q: card[0], a: card[1] });
        }
      });
    }
  });
  return cards;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTotalKnow() { return Object.values(ratings).filter(v => v === 'know').length; }
function getTotalUnsure() { return Object.values(ratings).filter(v => v === 'unsure').length; }
function getTotalDontKnow() { return Object.values(ratings).filter(v => v === 'dontknow').length; }
function getTotalRated() { return Object.values(ratings).length; }

function getSectionProgress(sectionId) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return 0;
  let known = 0;
  sec.cards.forEach((_, i) => {
    const id = `${sectionId}-${i}`;
    if (ratings[id] === 'know') known++;
  });
  return (known / sec.cards.length) * 100;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const totalCards = SECTIONS.reduce((s, sec) => s + sec.cards.length, 0);
  const totalKnown = SECTIONS.reduce((s, sec) => {
    return s + sec.cards.filter((_, i) => ratings[`${sec.id}-${i}`] === 'know').length;
  }, 0);

  let html = `<div class="sidebar-title">Блоки</div>`;
  html += `<div class="all-item ${activeSectionId === 0 ? 'active' : ''}" onclick="selectSection(0)">
    <div style="font-weight:600;font-size:13px;">📚 Все блоки</div>
    <div style="font-size:11px;color:var(--muted);margin-top:3px;">${totalCards} вопросов · ${totalKnown} изучено</div>
    <div class="section-progress-bar"><div class="section-progress-fill" style="width:${totalCards?totalKnown/totalCards*100:0}%;background:#6366f1;"></div></div>
  </div>`;

  SECTIONS.forEach(sec => {
    const prog = getSectionProgress(sec.id);
    const colorMap = {c1:'#6366f1',c2:'#0ea5e9',c3:'#a855f7',c4:'#f59e0b',c5:'#10b981',c6:'#ef4444',c7:'#f97316',c8:'#ec4899',c9:'#14b8a6'};
    const color = colorMap[sec.color] || '#6366f1';
    html += `<div class="section-item ${activeSectionId === sec.id ? 'active' : ''}" onclick="selectSection(${sec.id})">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <span class="section-dot ${sec.color}" style="margin-top:4px;"></span>
        <div>
          <div class="section-name">${sec.name}</div>
          <div class="section-meta">${sec.cards.length} вопросов · ${Math.round(prog)}% изучено</div>
          <div class="section-progress-bar"><div class="section-progress-fill" style="width:${prog}%;background:${color};"></div></div>
        </div>
      </div>
    </div>`;
  });

  sidebar.innerHTML = html;
}

function renderStatsBar() {
  const bar = document.getElementById('stats-bar');
  const total = currentDeck.length;
  const know = currentDeck.filter(c => ratings[c.id] === 'know').length;
  const unsure = currentDeck.filter(c => ratings[c.id] === 'unsure').length;
  const dontknow = currentDeck.filter(c => ratings[c.id] === 'dontknow').length;

  bar.innerHTML = `
    <div class="stat-chip"><strong style="color:var(--green)">${know}</strong> <span>знаю</span></div>
